k-management-permissions"}, {"n": 243, "cat": "リスク管理", "q": "Contosoは、アラートの初期トリアージ中に調査対象ユーザーの名前をアナリストへ表示しないようにする必要があります。何を構成すべきですか。", "choices": {"A": "監査ログの無効化", "B": "DLPアラートの削除", "C": "eDiscoveryケースの閉鎖", "D": "ユーザー名の匿名化"}, "answer": ["D"], "multi": false, "expl": "Insider Risk Managementのプライバシー設定でユーザー名を匿名化すると、適切な段階まで実名を非表示にしてバイアスを抑制できます。", "url": "https://learn.microsoft.com/en-us/purview/insider-risk-management-settings"}, {"n": 244, "cat": "リスク管理", "q": "Contosoはポリシーを作成する前に、組織内で発生している潜在的なリスクアクティビティと適切なしきい値の推奨を確認したいと考えています。何を有効化すべきですか。", "choices": {"A": "Insider Risk Analytics", "B": "eDiscoveryのOCR", "C": "Preservation Lock", "D": "Message Encryption"}, "answer": ["A"], "multi": false, "expl": "Insider Risk Analyticsは組織のアクティビティを評価し、潜在的なリスク領域やポリシーしきい値に関する洞察を提供します。", "url": "https://learn.microsoft.com/en-us/purview/insider-risk-management-settings-analytics"}, {"n": 245, "cat": "リスク管理", "q": "Contosoは、人事システムに記録された退職予定日をInsider Riskポリシーのトリガーとして使用する必要があります。最初に何を構成すべきですか。", "choices": {"A": "Exchangeメールフロールール", "B": "HRデータコネクタ", "C": "監査保持ポリシー", "D": "秘密度ラベル"}, "answer": ["B"], "multi": false, "expl": "退職、解雇、異動などの人事イベントをポリシートリガーとして使用するには、HRデータをInsider Risk Managementへ取り込むコネクタを構成します。", "url": "https://learn.microsoft.com/en-us/purview/import-hr-data"}, {"n": 246, "cat": "リスク管理", "q": "ContosoはHRデータをInsider Risk Managementへ取り込みます。人事レコードをMicrosoft 365ユーザーへ正しく関連付けるために必要な情報はどれですか。", "choices": {"A": "SharePointサイトのテンプレートIDだけ", "B": "DLPポリシーのGUIDだけ", "C": "ユーザーを一意に関連付けられる識別子", "D": "監査レコードの保持期間だけ"}, "answer": ["C"], "multi": false, "expl": "HRコネクタのデータは、メールアドレスやUPNなど、Microsoft 365ユーザーへ一意にマッピングできる識別子を含める必要があります。", "url": "https://learn.microsoft.com/en-us/purview/import-hr-data"}, {"n": 247, "cat": "リスク管理", "q": "ContosoはInsider Risk ManagementでGoogle DriveとDropboxへの収集、流出、削除アクティビティを指標として使用します。最初に何を行うべきですか。", "choices": {"A": "全ユーザーをeDiscovery保留にする", "B": "Auditを無効化する", "C": "保持ラベルを削除する", "D": "対象クラウドアプリをMicrosoft Defenderへ接続する"}, "answer": ["D"], "multi": false, "expl": "第三者クラウドストレージの指標を使用するには、対象アプリをMicrosoft Defender for Cloud Appsへ接続し、Insider Risk Managementでクラウド指標を選択できるようにします。", "url": "https://learn.microsoft.com/en-us/purview/insider-risk-management-policies"}, {"n": 248, "cat": "リスク管理", "q": "Contosoは、USBへのコピー、印刷、ネットワーク共有へのコピーをInsider Riskポリシーで評価する必要があります。構成すべきものはどれですか。", "choices": {"A": "デバイス指標", "B": "処分レビュー段階", "C": "eDiscovery検索条件だけ", "D": "監査保持期間"}, "answer": ["A"], "multi": false, "expl": "デバイス指標を有効化してポリシーへ含めると、オンボード済みデバイス上のUSBコピー、印刷、ネットワーク共有などのアクティビティを評価できます。", "url": "https://learn.microsoft.com/en-us/purview/insider-risk-management-settings-policy-indicators"}, {"n": 249, "cat": "リスク管理", "q": "Contosoは、退職予定または退職済みユーザーが知的財産を持ち出すリスクを検出するポリシーを作成します。最適なテンプレートはどれですか。", "choices": {"A": "Data leaks by risky users", "B": "Departing users data theft", "C": "Security policy violations", "D": "General security policy violations only"}, "answer": ["B"], "multi": false, "expl": "Departing users data theftテンプレートは、退職や雇用終了イベントの前後に発生するデータ持ち出し行動を検出するために設計されています。", "url": "https://learn.microsoft.com/en-us/purview/insider-risk-management-policy-templates"}, {"n": 250, "cat": "リスク管理", "q": "Contosoは、退職イベントに限定せず、ユーザーによる機密データの外部共有や持ち出しを継続的に検出する必要があります。適切なテンプレートはどれですか。", "choices": {"A": "Departing users data theftだけ", "B": "Audit log retention", "C": "Data leaks", "D": "eDiscovery export"}, "answer": ["C"], "multi": false, "expl": "Data leaksテンプレートは、ユーザーによる一般的な機密データの流出行動を検出するために使用し、退職者シナリオに限定されません。", "url": "https://learn.microsoft.com/en-us/purview/insider-risk-management-policy-templates"}, {"n": 251, "cat": "リスク管理", "q": "Contosoは、Microsoft Defender for Endpointで生成されたセキュリティアラートに関連する内部ユーザー行動をInsider Riskで評価する必要があります。どの種類のテンプレートを選択すべきですか。", "choices": {"A": "Departing users data theft", "B": "Records management", "C": "Message Encryption", "D": "Security policy violations"}, "answer": ["D"], "multi": false, "expl": "Security policy violationsテンプレートは、Defender for Endpointなどのセキュリティシグナルをトリガーに、関連する内部リスク行動を評価します。", "url": "https://learn.microsoft.com/en-us/purview/insider-risk-management-policy-templates"}, {"n": 252, "cat": "リスク管理", "q": "Contosoは、経営幹部と研究開発部門のユーザーに関連するInsider Riskアラートを優先的に識別する必要があります。何を構成すべきですか。", "choices": {"A": "優先ユーザーグループ", "B": "監査保持ポリシー", "C": "eDiscoveryレビューセット", "D": "DLPシミュレーション"}, "answer": ["A"], "multi": false, "expl": "優先ユーザーグループを使用すると、重要な役割や機密データへアクセスするユーザーのアラートを識別しやすくできます。", "url": "https://learn.microsoft.com/en-us/purview/insider-risk-management-settings"}, {"n": 253, "cat": "リスク管理", "q": "Insider Riskポリシーで多数の指標を選択しましたが、対象ユーザーのアクティビティが評価されません。ポリシーがユーザー評価を開始するために必要なものはどれですか。", "choices": {"A": "すべてのユーザーへのGlobal Administrator付与", "B": "構成済みのトリガーイベント", "C": "監査ログの削除", "D": "保持ラベルの手動適用"}, "answer": ["B"], "multi": false, "expl": "Insider Riskポリシーは、テンプレートに応じたトリガーイベントが発生した後、指定した時間枠内の指標アクティビティをリスクスコアリングします。", "url": "https://learn.microsoft.com/en-us/purview/insider-risk-management-policies"}, {"n": 254, "cat": "リスク管理", "q": "Contosoはフォレンジック証拠の画面キャプチャを初めて有効化します。ポリシーを作成する前に必要な操作はどれですか。", "choices": {"A": "全ユーザーをeDiscovery Administratorにする", "B": "Auditを無効化する", "C": "キャプチャ容量を申請して承認を受ける", "D": "すべての保持ポリシーをロックする"}, "answer": ["C"], "multi": false, "expl": "フォレンジック証拠を有効化する前に、組織で使用するキャプチャ容量を申請し、承認後に対象ユーザーやデバイスを構成します。", "url": "https://learn.microsoft.com/en-us/purview/insider-risk-management-forensic-evidence"}, {"n": 255, "cat": "リスク管理", "q": "Contosoはフォレンジック証拠を使用しますが、全ユーザーの画面を無差別に収集せず、ポリシーで対象となるユーザーとアクティビティに限定する必要があります。採用すべき方法はどれですか。", "choices": {"A": "全デバイスを常時録画する", "B": "監査ログを削除する", "C": "eDiscovery保留を無期限にする", "D": "対象ユーザーとキャプチャトリガーをポリシーで限定する"}, "answer": ["D"], "multi": false, "expl": "フォレンジック証拠は、プライバシーと必要性を考慮し、対象ユーザー、デバイス、キャプチャ対象アクティビティを限定して構成します。", "url": "https://learn.microsoft.com/en-us/purview/insider-risk-management-forensic-evidence"}, {"n": 256, "cat": "リスク管理", "q": "Contosoは、Insider Riskでリスクが上昇したユーザーに対してだけDLP制御を自動的に厳しくする必要があります。使用すべき機能はどれですか。", "choices": {"A": "Adaptive Protection", "B": "Preservation Lock", "C": "eDiscovery OCR", "D": "Message Encryptionのブランド設定"}, "answer": ["A"], "multi": false, "expl": "Adaptive ProtectionはInsider Risk ManagementのリスクレベルをDLPと連携し、ユーザーのリスク変化に応じて保護制御を動的に適用します。", "url": "https://learn.microsoft.com/en-us/purview/insider-risk-management-adaptive-protection"}, {"n": 257, "cat": "リスク管理", "q": "Adaptive Protectionを有効化した後、User1のリスク行動が解消されました。User1に適用されるDLP制御について正しい説明はどれですか。", "choices": {"A": "一度厳格化されると永久に変更されない", "B": "リスクレベルの変化に応じて対象と制御を動的に調整できる", "C": "必ず手動でユーザーを削除する", "D": "DLPとは連携しない"}, "answer": ["B"], "multi": false, "expl": "Adaptive ProtectionはユーザーのInsider Riskレベルを継続的に利用し、リスクが上がった場合も下がった場合も対応するDLP制御へ動的に割り当てます。", "url": "https://learn.microsoft.com/en-us/purview/insider-risk-management-adaptive-protection"}, {"n": 258, "cat": "リスク管理", "q": "アナリストはInsider Riskアラートをレビューし、追加調査が必要と判断しました。関連するアクティビティと証拠を継続管理するために次に何を行うべきですか。", "choices": {"A": "アラートを直ちに削除する", "B": "保持ポリシーを無効化する", "C": "アラートからInsider Riskケースを作成する", "D": "全ユーザーをブロックする"}, "answer": ["C"], "multi": false, "expl": "追加調査が必要なアラートはケースへ昇格し、調査担当者が関連アクティビティ、コンテンツ、メモ、対応履歴を一元管理します。", "url": "https://learn.microsoft.com/en-us/purview/insider-risk-management-cases"}, {"n": 259, "cat": "リスク管理", "q": "複数の調査担当者がInsider Riskケースの判断根拠と実施した対応を共有する必要があります。使用すべきケース機能はどれですか。", "choices": {"A": "ラベルの色", "B": "監査ログの無効化", "C": "DLPポリシーの削除", "D": "ケースノートとアクティビティ履歴"}, "answer": ["D"], "multi": false, "expl": "ケースノートと履歴を使用すると、調査の根拠、確認事項、実施した対応をケース内で記録して共同調査に利用できます。", "url": "https://learn.microsoft.com/en-us/purview/insider-risk-management-cases"}, {"n": 260, "cat": "リスク管理", "q": "Contosoは、軽微なポリシー違反をしたユーザーへ、調査担当者が一貫した教育メッセージを送信できるようにする必要があります。何を作成すべきですか。", "choices": {"A": "Insider Risk通知テンプレート", "B": "監査保持ポリシー", "C": "eDiscovery保留", "D": "秘密度ラベル"}, "answer": ["A"], "multi": false, "expl": "通知テンプレートは、ケース対応の一環としてユーザーへ送るリマインダーや教育メッセージを標準化します。", "url": "https://learn.microsoft.com/en-us/purview/insider-risk-management-notices"}, {"n": 261, "cat": "リスク管理", "q": "SOCアナリストはMicrosoft Defender XDRでInsider Riskアラートを他のセキュリティアラートと関連付けて調査する必要があります。Purviewで有効化すべき設定はどれですか。", "choices": {"A": "ユーザー名の匿名化だけ", "B": "他のセキュリティソリューションとユーザーリスク詳細を共有する", "C": "Auditを無効化する", "D": "保持ポリシーを削除する"}, "answer": ["B"], "multi": false, "expl": "Insider Risk Managementのデータ共有設定でユーザーリスク詳細の共有を有効化すると、適切な権限を持つSOC担当者がDefender XDRで相関調査できます。", "url": "https://learn.microsoft.com/en-us/defender-xdr/irm-investigate-alerts-defender"}, {"n": 262, "cat": "リスク管理", "q": "Contosoは、Microsoft 365サービスで実行されたユーザー操作と管理者操作を横断的に調査する必要があります。最初に使用すべきソリューションはどれですか。", "choices": {"A": "保持ラベル", "B": "Message Encryption", "C": "Microsoft Purview Audit", "D": "Teams会議テンプレート"}, "answer": ["C"], "multi": false, "expl": "Microsoft Purview Auditは、Exchange、SharePoint、OneDrive、Microsoft EntraなどのMicrosoft 365サービスで記録されたユーザー操作と管理者操作を検索します。", "url": "https://learn.microsoft.com/en-us/purview/audit-solutions-overview"}, {"n": 263, "cat": "リスク管理", "q": "Contosoは、先週User1がSharePointで実行したファイル削除操作だけを調査します。監査検索で指定すべき情報の組み合わせはどれですか。", "choices": {"A": "秘密度ラベルの色だけ", "B": "保持ラベルの期間だけ", "C": "デバイスの壁紙とIPアドレスだけ", "D": "日付範囲、ユーザー、アクティビティ／ワークロード"}, "answer": ["D"], "multi": false, "expl": "監査検索では日付範囲、ユーザー、アクティビティ、ワークロードなどを指定して、必要な監査イベントへ絞り込みます。", "url": "https://learn.microsoft.com/en-us/purview/audit-search"}, {"n": 264, "cat": "リスク管理", "q": "Contosoは大量の監査検索結果をExcelまたは分析ツールで追加処理する必要があります。検索完了後に行うべき操作はどれですか。", "choices": {"A": "結果をCSVへエクスポートする", "B": "監査を無効化する", "C": "保持ポリシーを削除する", "D": "全ユーザーのライセンスを削除する"}, "answer": ["A"], "multi": false, "expl": "監査検索結果はCSVへエクスポートし、Excelや他の分析ツールで並べ替え、フィルター、相関分析を行えます。", "url": "https://learn.microsoft.com/en-us/purview/audit-search"}, {"n": 265, "cat": "リスク管理", "q": "Contosoのゲストユーザーと非E5ユーザーについて、カスタム監査保持ポリシーを構成していません。2023年10月17日以降に生成された監査レコードの既定保持期間はどれですか。", "choices": {"A": "30日", "B": "180日", "C": "1年", "D": "10年"}, "answer": ["B"], "multi": false, "expl": "Audit (Standard)およびAudit (Premium)の対象既定ポリシーが適用されない非E5／ゲストユーザーの監査レコードは、既定で180日保持されます。", "url": "https://learn.microsoft.com/en-us/purview/audit-log-retention-policies"}, {"n": 266, "cat": "リスク管理", "q": "Contosoは、特定ユーザーによるMicrosoft Teamsの監査レコードを3年間保持するカスタムポリシーを作成します。監査保持ポリシーで指定できる条件はどれですか。", "choices": {"A": "秘密度ラベルの透かしだけ", "B": "Teams会議のロビー設定だけ", "C": "ユーザー、レコード種類、保持期間、優先度", "D": "SharePointサイトのテーマだけ"}, "answer": ["C"], "multi": false, "expl": "カスタム監査保持ポリシーは、ユーザー、レコード種類、必要に応じて特定アクティビティ、保持期間、優先度を使用して構成します。", "url": "https://learn.microsoft.com/en-us/purview/audit-log-retention-policies"}, {"n": 267, "cat": "リスク管理", "q": "ContosoはExchangeとTeamsの監査レコードを同じ期間保持するため、1つのカスタム監査保持ポリシーへ複数のレコード種類を追加します。この場合のアクティビティ選択について正しい説明はどれですか。", "choices": {"A": "必ず1つのアクティビティだけを選択する", "B": "レコード種類は自動的に1つへ削減される", "C": "ポリシーは作成できない", "D": "複数レコード種類を選択すると個別アクティビティは指定できない"}, "answer": ["D"], "multi": false, "expl": "複数のレコード種類を1つの監査保持ポリシーへ含めることはできますが、その場合は個別アクティビティを選択せず、選択した種類の全アクティビティへ適用します。", "url": "https://learn.microsoft.com/en-us/purview/audit-log-retention-policies"}, {"n": 268, "cat": "リスク管理", "q": "Contosoでは、既定で1年保持される対象ユーザーのExchange監査レコードに対し、6か月保持のカスタムポリシーが一致します。どの期間が適用されますか。", "choices": {"A": "6か月", "B": "1年", "C": "10年", "D": "無期限"}, "answer": ["A"], "multi": false, "expl": "組織が作成したカスタム監査保持ポリシーは既定ポリシーより優先されます。このため、一致するカスタムポリシーの6か月が適用されます。", "url": "https://learn.microsoft.com/en-us/purview/audit-log-retention-policies"}, {"n": 269, "cat": "リスク管理", "q": "同じ監査レコードへPriority 5とPriority 20のカスタム監査保持ポリシーが一致します。優先されるポリシーはどれですか。", "choices": {"A": "Priority 20", "B": "Priority 5", "C": "新しい方", "D": "名前が短い方"}, "answer": ["B"], "multi": false, "expl": "監査保持ポリシーは数値が小さいほど優先度が高く、1が最高、10000が最低です。したがってPriority 5が優先されます。", "url": "https://learn.microsoft.com/en-us/purview/audit-log-retention-policies"}, {"n": 270, "cat": "リスク管理", "q": "Contosoは多数のカスタム監査保持ポリシーを設計しています。テナントで作成できる監査保持ポリシーの上限はいくつですか。", "choices": {"A": "5", "B": "500", "C": "50", "D": "無制限"}, "answer": ["C"], "multi": false, "expl": "Microsoft Purview Auditでは、組織あたり最大50個のカスタム監査ログ保持ポリシーを作成できます。", "url": "https://learn.microsoft.com/en-us/purview/audit-log-retention-policies"}, {"n": 271, "cat": "リスク管理", "q": "Contosoは、DLPルールへ一致した操作と、その後に発生したUSBコピーや印刷などの送出方法を時系列で調査する必要があります。使用すべきツールはどれですか。", "choices": {"A": "Content Explorerだけ", "B": "Service health", "C": "Teams利用状況レポート", "D": "Activity Explorer"}, "answer": ["D"], "multi": false, "expl": "Activity ExplorerにはDLP Rule Matchedイベントと、USBコピーや印刷などの関連アクティビティが記録され、フィルターして調査できます。", "url": "https://learn.microsoft.com/en-us/purview/data-classification-activity-explorer"}, {"n": 272, "cat": "リスク管理", "q": "ContosoはInformation Protectionクライアントとスキャナーが実行した保護の適用、変更、削除、およびファイル検出を確認する必要があります。使用すべきツールはどれですか。", "choices": {"A": "Activity Explorer", "B": "eDiscovery保留", "C": "Audit保持ポリシーの作成画面", "D": "Teams管理センター"}, "answer": ["A"], "multi": false, "expl": "Activity ExplorerではInformation ProtectionクライアントとスキャナーによるProtection applied、changed、removed、Files discoveredなどを確認できます。", "url": "https://learn.microsoft.com/en-us/purview/data-classification-activity-explorer"}, {"n": 273, "cat": "リスク管理", "q": "Contosoは、低頻度だが重大な1件の違反では直ちに通知し、高頻度の反復イベントでは一定期間に集約して通知する必要があります。使用するアラート方式の組み合わせはどれですか。", "choices": {"A": "保持ラベルと秘密度ラベル", "B": "単一イベントアラートと集約イベントアラート", "C": "eDiscovery保留とレビューセット", "D": "監査保持とPreservation Lock"}, "answer": ["B"], "multi": false, "expl": "DLPは、個別の重大イベントに適する単一イベントアラートと、一定時間内の高頻度イベントをまとめる集約イベントアラートをサポートします。", "url": "https://learn.microsoft.com/en-us/purview/dlp-alerts-get-started"}, {"n": 274, "cat": "リスク管理", "q": "DLPアラートが生成されました。担当者は一致したポリシー、ユーザー、アクティビティ、影響を確認し、原因と修復方法を判断する必要があります。主要な調査場所はどれですか。", "choices": {"A": "Teams会議オプションだけ", "B": "Exchangeメールフロールール一覧だけ", "C": "PurviewのDLPアラートダッシュボードとMicrosoft Defenderポータル", "D": "Azure Cost Managementだけ"}, "answer": ["C"], "multi": false, "expl": "DLPアラートはPurviewのDLPアラート管理ダッシュボードとMicrosoft Defenderポータルでトリアージ・調査し、必要に応じてActivity Explorerも利用します。", "url": "https://learn.microsoft.com/en-us/purview/dlp-alert-investigation-learn"}, {"n": 275, "cat": "リスク管理", "q": "SOCは、DLPアラートを同じユーザーやデバイスに関連するDefenderの他アラートとまとめて調査する必要があります。何を使用すべきですか。", "choices": {"A": "保持ラベルの処分レビュー", "B": "Teams会議テンプレート", "C": "Content Explorerの一覧だけ", "D": "Microsoft Defender XDRのインシデント"}, "answer": ["D"], "multi": false, "expl": "Microsoft Defender XDRではPurview DLPアラートを他のセキュリティアラートとインシデントに相関し、ユーザー、デバイス、証拠を横断して調査できます。", "url": "https://learn.microsoft.com/en-us/defender-xdr/dlp-investigate-alerts-defender"}, {"n": 276, "cat": "リスク管理", "q": "Defender for Cloud Appsのファイルポリシーが、機密情報を含む外部共有ファイルを検出しました。最初に確認すべきものはどれですか。", "choices": {"A": "ファイルポリシーアラートの一致条件、ファイル、所有者、共有状態", "B": "Teams会議のロビー設定", "C": "監査保持ポリシーの最大数", "D": "Officeテーマ"}, "answer": ["A"], "multi": false, "expl": "ファイルポリシーアラートでは、一致したファイル、所有者、場所、共有状態、検出条件を確認し、必要なガバナンスアクションや修復を判断します。", "url": "https://learn.microsoft.com/en-us/defender-cloud-apps/data-protection-policies"}, {"n": 277, "cat": "リスク管理", "q": "Contosoは新しいMicrosoft Purviewポータルで組織全体のコンテンツ検索を作成します。現行の操作場所はどれですか。", "choices": {"A": "旧Content Searchソリューションだけ", "B": "eDiscoveryの検索エクスペリエンスまたはContent Searchケース", "C": "Teams管理センター", "D": "Exchangeメールフロールール"}, "answer": ["B"], "multi": false, "expl": "現行PurviewではContent Search機能はeDiscoveryの検索エクスペリエンスへ統合され、新規・既存のコンテンツ検索はeDiscovery内で管理します。", "url": "https://learn.microsoft.com/en-us/purview/edisc"}, {"n": 278, "cat": "リスク管理", "q": "Contosoは訴訟ごとに検索、保留、エクスポート、レビュー担当者をまとめて管理する必要があります。作成すべきものはどれですか。", "choices": {"A": "秘密度ラベル", "B": "Endpoint DLP設定", "C": "eDiscoveryケース", "D": "監査保持ポリシーだけ"}, "answer": ["C"], "multi": false, "expl": "eDiscoveryケースは調査単位のコンテナーで、メンバー、データソース、保留、検索、エクスポート、レビューなどをまとめて管理します。", "url": "https://learn.microsoft.com/en-us/purview/edisc"}, {"n": 279, "cat": "リスク管理", "q": "Contosoの調査ではExchangeメール、Teamsメッセージ、OneDrive、SharePoint、Viva Engageのコンテンツを対象にする必要があります。使用すべきソリューションはどれですか。", "choices": {"A": "Endpoint DLPだけ", "B": "Information Protectionスキャナーだけ", "C": "Message Encryptionだけ", "D": "Microsoft Purview eDiscovery"}, "answer": ["D"], "multi": false, "expl": "Microsoft Purview eDiscoveryはExchange Online、Teams、Microsoft 365 Groups、OneDrive、SharePoint、Viva Engageなどの電子情報を検索・保全できます。", "url": "https://learn.microsoft.com/en-us/purview/edisc"}, {"n": 280, "cat": "リスク管理", "q": "ContosoはUser1のメールボックスと複数のSharePointサイトを同じ条件で検索し、一括で結果を評価する必要があります。正しい方法はどれですか。", "choices": {"A": "1つのeDiscovery検索へメールボックスとサイトをデータソースとして追加する", "B": "メールとサイトは同じ検索に含められない", "C": "DLPポリシーを検索として使用する", "D": "保持ラベルを検索として使用する"}, "answer": ["A"], "multi": false, "expl": "eDiscoveryでは、メールボックスとサイトを同じ検索のデータソースとして指定し、共通の条件でMicrosoft 365コンテンツを横断検索できます。", "url": "https://learn.microsoft.com/en-us/purview/edisc"}, {"n": 281, "cat": "リスク管理", "q": "訴訟対象ユーザーがメールやOneDriveファイルを削除しても、案件が完了するまで証拠を保全する必要があります。eDiscoveryケースで何を作成すべきですか。", "choices": {"A": "DLPシミュレーション", "B": "保留", "C": "秘密度ラベル発行ポリシー", "D": "Teams会議テンプレート"}, "answer": ["B"], "multi": false, "expl": "eDiscoveryの保留は、対象メールボックスやサイトのコンテンツをユーザーの変更・削除から保全し、ケースが必要とする期間維持します。", "url": "https://learn.microsoft.com/en-us/purview/edisc-hold-create"}, {"n": 282, "cat": "リスク管理", "q": "Contosoは検索結果をエクスポートする前に、場所別のヒット件数と検索条件の有効性を確認する必要があります。最初に何を確認すべきですか。", "choices": {"A": "保持ラベルの色", "B": "Teamsの出席者レポート", "C": "検索統計とサンプル結果", "D": "Azure請求書"}, "answer": ["C"], "multi": false, "expl": "検索統計とサンプルを確認すると、データソース別のヒット状況やクエリの有効性を評価し、必要に応じて条件を調整できます。", "url": "https://learn.microsoft.com/en-us/purview/edisc"}, {"n": 283, "cat": "リスク管理", "q": "法務部門は、確定したeDiscovery検索の結果と関連レポートを外部の弁護士へ引き渡す必要があります。使用すべき機能はどれですか。", "choices": {"A": "DLPユーザーオーバーライド", "B": "秘密度ラベルのダウングレード", "C": "Auditの無効化", "D": "検索結果のエクスポート"}, "answer": ["D"], "multi": false, "expl": "eDiscoveryのエクスポート機能を使用して、検索で特定したコンテンツと関連レポートを調査・法務プロセス向けに出力します。", "url": "https://learn.microsoft.com/en-us/purview/edisc"}, {"n": 284, "cat": "リスク管理", "q": "Contosoは収集した文書をケース内でタグ付けし、重複を整理して、法務担当者が関連性をレビューできるようにする必要があります。使用すべきものはどれですか。", "choices": {"A": "レビューセット", "B": "監査保持ポリシー", "C": "Teams保持場所", "D": "Message Encryption"}, "answer": ["A"], "multi": false, "expl": "Premium eDiscoveryのレビューセットは、収集したコンテンツをケース内で整理、フィルター、タグ付け、分析し、関連性レビューを行うために使用します。", "url": "https://learn.microsoft.com/en-us/purview/edisc"}, {"n": 285, "cat": "リスク管理", "q": "調査対象のメールボックスに、一部インデックス化されたアイテムが多数あります。現行eDiscoveryで検索可能性を改善する方法として正しいものはどれですか。", "choices": {"A": "データソースごとに旧ポータルから手動再インデックスする", "B": "検索を実行または再実行し、処理時に高度なインデックスを自動実行させる", "C": "DLPポリシーを停止する", "D": "Auditを無効化する"}, "answer": ["B"], "multi": false, "expl": "現行eDiscoveryでは、統計検索、レビューセットへの追加、エクスポートなどの処理時に高度なインデックスが自動実行されます。旧方式のように事前にデータソースを個別再インデックスする必要はありません。", "url": "https://learn.microsoft.com/en-us/purview/edisc"}, {"n": 286, "cat": "リスク管理", "q": "User1は割り当てられたeDiscoveryケースだけを管理します。User2は組織内のすべてのeDiscoveryケースへアクセスする必要があります。ロールの組み合わせはどれですか。", "choices": {"A": "両者をReports Readerにする", "B": "User1をGlobal Reader、User2をSecurity Readerにする", "C": "User1をeDiscovery Manager、User2をeDiscovery Administratorにする", "D": "両者をInformation Protection Readerにする"}, "answer": ["C"], "multi": false, "expl": "eDiscovery Managerはメンバーとして割り当てられたケースを管理し、eDiscovery Administratorは組織内のすべてのケースへアクセスできます。", "url": "https://learn.microsoft.com/en-us/purview/edisc"}, {"n": 287, "cat": "リスク管理", "q": "ContosoはCopilot、エージェント、第三者生成AIアプリの利用状況とデータリスクを1か所で把握し、推奨される保護を展開する必要があります。使用すべきソリューションはどれですか。", "choices": {"A": "Teams Phone", "B": "Exchange public folders", "C": "Windows Update for Business", "D": "Microsoft Purview Data Security Posture Management"}, "answer": ["D"], "multi": false, "expl": "DSPMはAIアプリとエージェントを含むデータセキュリティ態勢を中央で可視化し、推奨事項、レポート、ポリシー、調査機能を提供します。", "url": "https://learn.microsoft.com/en-us/purview/dspm-for-ai"}, {"n": 288, "cat": "リスク管理", "q": "ContosoはDSPMでMicrosoft 365 Copilotとエージェントの対話を監視します。最初に確認すべき前提条件はどれですか。", "choices": {"A": "Microsoft Purview Auditが有効であること", "B": "すべての保持ポリシーが削除されていること", "C": "Exchangeハイブリッドが必須であること", "D": "全ユーザーがGlobal Administratorであること"}, "answer": ["A"], "multi": false, "expl": "Copilotやエージェントの対話を監視するには、組織でMicrosoft Purview Auditが有効になっている必要があります。", "url": "https://learn.microsoft.com/en-us/purview/dspm-for-ai"}, {"n": 289, "cat": "リスク管理", "q": "Contosoは端末へブラウザー拡張機能を展開できません。対応するSASEまたはSSEを経由する通信について、第三者AIサイトへ送信される機密情報をネットワーク層で検出する必要があります。使用すべき機能はどれですか。", "choices": {"A": "eDiscovery保留", "B": "Purview Network Data SecurityとのSASE／SSE統合", "C": "監査保持ポリシーだけ", "D": "Teams会議ラベル"}, "answer": ["B"], "multi": false, "expl": "Purview Network Data Securityは対応するSASE／SSEとの統合により、端末のブラウザー拡張機能ではなくネットワーク層でSITを検出できます。", "url": "https://learn.microsoft.com/en-us/purview/ai-other-apps"}, {"n": 290, "cat": "リスク管理", "q": "ContosoはmacOS端末でEndpoint DLPを使用します。Chrome向けMicrosoft Purview拡張機能について正しい説明はどれですか。", "choices": {"A": "macOSでも必ず同じWindows拡張機能が必要である", "B": "拡張機能がないと監査ログを一切保存できない", "C": "この拡張機能はWindows用で、macOSのDLP強制には不要である", "D": "拡張機能はExchangeサーバーへインストールする"}, "answer": ["C"], "multi": false, "expl": "Microsoft Purview Chrome拡張機能はWindowsデバイス向けです。macOSではEndpoint DLPの強制に同じ拡張機能を必要としません。", "url": "https://learn.microsoft.com/en-us/purview/dlp-chrome-get-started"}, {"n": 291, "cat": "リスク管理", "q": "Contosoは独自のEntra登録AIアプリへ、Purviewの分類、監査、DLPなどの機能を統合する必要があります。AIアプリ側で何を使用すべきですか。", "choices": {"A": "Teams保持ポリシーだけ", "B": "監査CSVエクスポートだけ", "C": "Information Protectionスキャナーだけ", "D": "Microsoft Purview SDK"}, "answer": ["D"], "multi": false, "expl": "Entra登録AIアプリはMicrosoft Purview SDKと統合することで、対応するPurviewデータセキュリティ・コンプライアンス機能を利用できます。", "url": "https://learn.microsoft.com/en-us/purview/ai-other-apps"}, {"n": 292, "cat": "リスク管理", "q": "ContosoはMicrosoft 365 Copilot以外の対応AIアプリへPurview制御を展開します。構成時に追加で要求される可能性が高いものはどれですか。", "choices": {"A": "Azureの従量課金請求", "B": "Exchangeハイブリッドサーバー", "C": "全ユーザーへのGlobal Administrator", "D": "10年監査保持アドオンだけ"}, "answer": ["A"], "multi": false, "expl": "Microsoft 365 CopilotやMicrosoft Facilitator以外のAIアプリでは、対応するPurview機能を使用するために組織の従量課金請求設定が必要になる場合があります。", "url": "https://learn.microsoft.com/en-us/purview/ai-other-apps"}, {"n": 293, "cat": "リスク管理", "q": "User1はDSPMで推奨ポリシーを有効化し、設定を変更します。グローバル管理者を使用せずに必要な権限を付与する場合、適切なロールはどれですか。", "choices": {"A": "Reports Reader", "B": "Microsoft Entra Compliance Administrator", "C": "Security Readerだけ", "D": "Content Explorer List Viewerだけ"}, "answer": ["B"], "multi": false, "expl": "Compliance AdministratorはDSPMの表示、ポリシー有効化、構成変更を行える管理ロールです。Global Administratorより限定された権 のプロンプトへ貼り付ける操作を警告またはブロックする必要があります。使用すべき機能はどれですか。", "choices": {"A": "保持ラベルだけ", "B": "監査保持ポリシーだけ", "C": "Endpoint DLPポリシー", "D": "eDiscoveryレビューセットだけ"}, "answer": ["C"], "multi": false, "expl": "対応する第三者AIサイトへの貼り付けやアップロードは、デバイスとブラウザーの前提条件を満たしたうえでEndpoint DLPポリシーにより監査、警告、ブロックできます。", "url": "https://learn.microsoft.com/en-us/purview/ai-other-apps"}, {"n": 299, "cat": "リスク管理", "q": "Contosoは第三者AIサイト上のプロンプトそのものへPurview秘密度ラベルを直接適用する案を検討しています。現行の対応状況として正しいものはどれですか。", "choices": {"A": "秘密度ラベルだけが対応しDLPは未対応である", "B": "すべてのPurview機能が未対応である", "C": "保持ラベルだけが対応する", "D": "第三者AI対話への秘密度ラベル直接適用は未対応だが、DLPは対応する"}, "answer": ["D"], "multi": false, "expl": "第三者AI対話ではDLP、監査、Insider Riskなどを利用できますが、AI対話そのものへの秘密度ラベルやラベル暗号化の直接適用はサポートされません。", "url": "https://learn.microsoft.com/en-us/purview/ai-other-apps"}, {"n": 300, "cat": "リスク管理", "q": "Contosoは、DSPMのAIエージェントが推奨した共有リンク削除や権限変更について、実行前の人間による承認と実行後の追跡を必要とします。正しい説明はどれですか。", "choices": {"A": "ユーザーが推奨アクションを確認・承認し、実行内容は監査ログへ記録される", "B": "AIエージェントが承認なしで必ず即時実行する", "C": "エージェント操作は監査できない", "D": "すべての操作はExchangeメールフロールールになる"}, "answer": ["A"], "multi": false, "expl": "DSPMのエージェントは推奨事項を提示し、ユーザーが確認・承認または調整します。自動化されたアクションを含む実行履歴は監査とエージェントアクティビティで追跡できます。", "url": "https://learn.microsoft.com/en-us/purview/data-security-posture-management-application-card"}];
const CATS = ["情報保護","DLPと保持","リスク管理"];
const CAT_FULL = {"情報保護":"情報保護の実装","DLPと保持":"データ損失防止と保持の実装","リスク管理":"リスク・アラート・アクティビティ管理"};
let state=null;
let settings={count:100,feedback:true};
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function perCatCounts(total){const base=Math.floor(total/3),r=total-base*3;const extra=shuffle([0,1,2]).slice(0,r);return CATS.map((_,i)=>base+(extra.includes(i)?1:0));}
function buildSet(){
  const counts=perCatCounts(settings.count);
  let picked=[];
  CATS.forEach((cat,i)=>{const pool=shuffle(QUESTIONS.filter(q=>q.cat===cat));picked=picked.concat(pool.slice(0,counts[i]));});
  picked=shuffle(picked);
  return picked.map(q=>{const keys=Object.keys(q.choices);return {q,order:shuffle(keys),given:[],done:false,correct:false};});
}
const countOpts=document.getElementById('countOpts');
[30,60,100].forEach(v=>{const d=document.createElement('div');d.className='opt'+(v===settings.count?' sel':'');d.textContent=v+'問';
  d.onclick=()=>{settings.count=v;[...countOpts.children].forEach(c=>c.classList.remove('sel'));d.classList.add('sel');updateStartCounts();};countOpts.appendChild(d);});
function updateStartCounts(){const c=perCatCounts(settings.count);document.getElementById('c1').textContent=c[0]+'問';document.getElementById('c2').textContent=c[1]+'問';document.getElementById('c3').textContent=c[2]+'問';}
updateStartCounts();
const fbToggle=document.getElementById('fbToggle'),fbMark=document.getElementById('fbMark');
function renderFb(){if(settings.feedback){fbToggle.classList.add('sel');fbMark.textContent='✓';}else{fbToggle.classList.remove('sel');fbMark.textContent='';}}
renderFb();
fbToggle.onclick=()=>{settings.feedback=!settings.feedback;renderFb();};
document.getElementById('startBtn').onclick=()=>{state={set:buildSet(),idx:0};show('quiz');renderQ();};
function show(id){['start','quiz','result','review'].forEach(s=>document.getElementById(s).classList.toggle('hide',s!==id));window.scrollTo(0,0);}
const elQ=document.getElementById('qtext'),elCh=document.getElementById('choices'),elFb=document.getElementById('feedback'),elAct=document.getElementById('actionBtn');
function renderQ(){
  const item=state.set[state.idx],q=item.q;
  document.getElementById('counter').textContent=(state.idx+1)+' / '+state.set.length;
  const corr=state.set.filter(x=>x.done&&x.correct).length;
  document.getElementById('score').textContent='正答 '+corr;
  document.getElementById('prog').style.width=((state.idx)/state.set.length*100)+'%';
  document.getElementById('catBadge').textContent=q.cat;
  document.getElementById('multiBadge').classList.toggle('hide',!q.multi);
  elQ.textContent=q.q;elFb.innerHTML='';elCh.innerHTML='';item.given=[];
  item.order.forEach(key=>{const div=document.createElement('div');div.className='choice';div.dataset.key=key;
    div.innerHTML='<div class="mark">'+key+'</div><div class="ctxt">'+escapeHtml(q.choices[key])+'</div>';
    div.onclick=()=>toggleChoice(item,div,key);elCh.appendChild(div);});
  elAct.disabled=true;elAct.className='btn primary';elAct.textContent=q.multi?'回答する（複数選択可）':'回答する';elAct.onclick=()=>submit(item);
}
function toggleChoice(item,div,key){
  if(item.done)return;
  if(item.q.multi){const i=item.given.indexOf(key);if(i>=0){item.given.splice(i,1);div.classList.remove('sel');}else{item.given.push(key);div.classList.add('sel');}}
  else{item.given=[key];[...elCh.children].forEach(c=>c.classList.toggle('sel',c===div));}
  elAct.disabled=item.given.length===0;
}
function arraysEqual(a,b){if(a.length!==b.length)return false;const s=new Set(b);return a.every(x=>s.has(x));}
function submit(item){
  if(item.done){next();return;}
  item.done=true;const q=item.q;
  item.correct=arraysEqual(item.given.slice().sort(),q.answer.slice().sort());
  [...elCh.children].forEach(div=>{const k=div.dataset.key;div.onclick=null;
    const isAns=q.answer.includes(k),isGiven=item.given.includes(k);
    if(settings.feedback){if(isAns)div.classList.add('correct');else if(isGiven)div.classList.add('wrong');else div.classList.add('dim');}
    else{if(!isGiven)div.classList.add('dim');}});
  if(settings.feedback){const fb=document.createElement('div');fb.className='fb '+(item.correct?'ok':'ng');
    fb.innerHTML='<div class="head">'+(item.correct?'正解':'不正解')+' ・ 正答 '+q.answer.join('、')+'</div>'+
      '<div class="expl">'+escapeHtml(q.expl)+'</div>'+
      (q.url?'<a class="link" href="'+q.url+'" target="_blank" rel="noopener">Microsoft公式資料 ↗</a>':'');
    elFb.appendChild(fb);}
  const corr=state.set.filter(x=>x.done&&x.correct).length;
  document.getElementById('score').textContent='正答 '+corr;
  elAct.disabled=false;elAct.className='btn '+(settings.feedback?(item.correct?'ok':'primary'):'primary');
  elAct.textContent=(state.idx+1<state.set.length)?'次の問題へ':'結果を見る';elAct.onclick=()=>next();
}
function next(){if(state.idx+1<state.set.length){state.idx++;renderQ();}else finish();}
document.getElementById('quitBtn').onclick=()=>{if(confirm('ここまでの回答で採点します。よろしいですか？'))finish();};
function finish(){
  const answered=state.set.filter(x=>x.done);const total=answered.length;
  const correct=answered.filter(x=>x.correct).length;const pct=total?Math.round(correct/total*100):0;
  document.getElementById('rPct').textContent=pct+'%';document.getElementById('rNum').textContent=correct+'/'+total;
  const v=document.getElementById('verdict');let msg,col;
  if(pct>=80){msg='合格ラインです。この調子で維持しましょう。';col='var(--ok)';}
  else if(pct>=70){msg='あと一歩。弱点カテゴリを重点復習しましょう。';col='var(--warn)';}
  else{msg='基礎の反復が必要です。誤答の解説から固めましょう。';col='var(--ng)';}
  v.textContent=msg;v.style.color=col;
  const cs={};CATS.forEach(c=>cs[c]={t:0,c:0});
  answered.forEach(x=>{cs[x.q.cat].t++;if(x.correct)cs[x.q.cat].c++;});
  const csEl=document.getElementById('catStats');csEl.innerHTML='';
  CATS.forEach(cat=>{const o=cs[cat];if(o.t===0)return;const p=Math.round(o.c/o.t*100);
    const col=p>=80?'var(--ok)':p>=70?'var(--warn)':'var(--ng)';const d=document.createElement('div');d.className='catrow';
    d.innerHTML='<div style="display:flex;justify-content:space-between"><span>'+CAT_FULL[cat]+'</span><span>'+o.c+'/'+o.t+'（'+p+'%）</span></div>'+
      '<div class="catbar"><div class="catfill" style="width:'+p+'%;background:'+col+'"></div></div>';csEl.appendChild(d);});
  const wEl=document.getElementById('weak');
  const rates=CATS.filter(c=>cs[c].t>0).map(c=>({c,p:cs[c].c/cs[c].t}));rates.sort((a,b)=>a.p-b.p);
  let wh='';
  if(rates.length&&rates[0].p<1){const worst=rates.filter(r=>r.p<0.8);
    if(worst.length){wh='<div>正答率が伸びていないカテゴリ：</div><div class="tags">'+worst.map(r=>'<span class="tag wrong">'+CAT_FULL[r.c]+'（'+Math.round(r.p*100)+'%）</span>').join('')+'</div>';}
    else{wh='<div>大きな弱点はありません。誤答問題を個別に見直しましょう。</div>';}}
  else{wh='<div>全問正解です。素晴らしい。</div>';}
  wEl.innerHTML=wh;
  const wrong=answered.filter(x=>!x.correct).map(x=>x.q).sort((a,b)=>a.n-b.n);
  const wl=document.getElementById('wrongList');
  document.getElementById('wrongCard').classList.toggle('hide',wrong.length===0);
  wl.innerHTML=wrong.map(q=>'<span class="tag wrong">第'+q.n+'問</span>').join('')||'';
  state.lastAnswered=answered;show('result');
}
document.getElementById('againBtn').onclick=()=>{show('start');};
document.getElementById('reviewWrongBtn').onclick=()=>renderReview(state.lastAnswered.filter(x=>!x.correct),'誤答の復習');
document.getElementById('reviewAllBtn').onclick=()=>renderReview(state.lastAnswered,'全問の解説');
document.getElementById('revBackBtn').onclick=()=>show('result');
function renderReview(items,title){
  document.getElementById('revTitle').textContent=title+'（'+items.length+'問）';
  const body=document.getElementById('revBody');body.innerHTML='';
  if(items.length===0){body.innerHTML='<div class="card">該当する問題はありません。</div>';show('review');return;}
  items.slice().sort((a,b)=>a.q.n-b.q.n).forEach(item=>{const q=item.q;const c=document.createElement('div');c.className='card';let ch='';
    Object.keys(q.choices).forEach(k=>{const isAns=q.answer.includes(k),isGiven=item.given.includes(k);let cls='choice dim';
      if(isAns)cls='choice correct';else if(isGiven)cls='choice wrong';
      ch+='<div class="'+cls+'" style="cursor:default"><div class="mark">'+k+'</div><div class="ctxt">'+escapeHtml(q.choices[k])+'</div></div>';});
    c.innerHTML='<div><span class="badge">'+q.cat+'</span> <span class="sub">第'+q.n+'問</span> '+
      (item.correct?'<span class="tag" style="border-color:#1e6b45;color:#7de0a8">正解</span>':'<span class="tag wrong">誤答</span>')+'</div>'+
      '<div class="q" style="margin-top:10px">'+escapeHtml(q.q)+'</div><div class="choices">'+ch+'</div>'+
      '<div class="fb ok" style="background:var(--card2);border-color:var(--line);margin-top:12px">'+
        '<div class="head" style="color:var(--tx)">正答 '+q.answer.join('、')+'</div>'+
        '<div class="expl">'+escapeHtml(q.expl)+'</div>'+
        (q.url?'<a class="link" href="'+q.url+'" target="_blank" rel="noopener">Microsoft公式資料 ↗</a>':'')+
      '</div>';body.appendChild(c);});
  show('review');
}
function escapeHtml(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
