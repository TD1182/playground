<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b1220">
<title>SC-401 対策</title>
<style>
:root{
  --bg:#0b1220; --card:#151f33; --card2:#1c2942; --line:#2a3a58;
  --tx:#e8eef8; --mut:#9fb0cc; --acc:#4f8cff;
  --ok:#2ecc71; --okbg:#123524; --ng:#ff5c6c; --ngbg:#3a1620; --warn:#ffb84d;
  --safe-t:env(safe-area-inset-top); --safe-b:env(safe-area-inset-bottom);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--tx);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
  line-height:1.6;font-size:17px;-webkit-text-size-adjust:100%}
#app{max-width:640px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.pad{padding:16px}
.topbar{position:sticky;top:0;z-index:10;background:rgba(11,18,32,.92);
  backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:calc(var(--safe-t) + 10px) 16px 10px}
.progwrap{height:8px;background:var(--card);border-radius:6px;overflow:hidden;margin-top:8px}
.prog{height:100%;background:linear-gradient(90deg,var(--acc),#7db0ff);width:0%;transition:width .3s}
.metarow{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--mut)}
.badge{display:inline-block;padding:3px 10px;border-radius:999px;background:var(--card2);
  color:var(--acc);font-size:12px;font-weight:700;border:1px solid var(--line)}
.badge.multi{color:var(--warn);border-color:#5a4620}
h1{font-size:24px;margin:0 0 4px}
h2{font-size:19px;margin:18px 0 8px}
.sub{color:var(--mut);font-size:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin:14px 0}
.q{font-size:18px;font-weight:600;white-space:pre-wrap;margin-bottom:6px}
.choices{margin-top:14px;display:flex;flex-direction:column;gap:10px}
.choice{display:flex;gap:12px;align-items:flex-start;background:var(--card2);
  border:2px solid var(--line);border-radius:14px;padding:14px;cursor:pointer;transition:.15s}
.choice:active{transform:scale(.99)}
.choice.sel{border-color:var(--acc);background:#1a2b4d}
.choice.correct{border-color:var(--ok);background:var(--okbg)}
.choice.wrong{border-color:var(--ng);background:var(--ngbg)}
.choice.dim{opacity:.55}
.mark{flex:0 0 28px;height:28px;border-radius:50%;background:#0e1728;border:2px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:var(--mut)}
.choice.sel .mark{border-color:var(--acc);color:var(--acc)}
.choice.correct .mark{border-color:var(--ok);color:var(--ok);background:var(--okbg)}
.choice.wrong .mark{border-color:var(--ng);color:var(--ng);background:var(--ngbg)}
.ctxt{flex:1;padding-top:2px;font-size:16px}
.btn{display:block;width:100%;border:none;border-radius:14px;padding:16px;font-size:17px;font-weight:800;cursor:pointer;font-family:inherit}
.btn.primary{background:var(--acc);color:#fff}
.btn.primary:disabled{background:#2b3a56;color:#6f809c}
.btn.ghost{background:var(--card2);color:var(--tx);border:1px solid var(--line)}
.btn.ok{background:var(--ok);color:#052}
.footbar{position:sticky;bottom:0;background:rgba(11,18,32,.94);backdrop-filter:blur(8px);
  border-top:1px solid var(--line);padding:12px 16px calc(var(--safe-b) + 12px)}
.fb{margin-top:14px;border-radius:14px;padding:14px;font-size:15px}
.fb.ok{background:var(--okbg);border:1px solid #1e6b45}
.fb.ng{background:var(--ngbg);border:1px solid #7a2733}
.fb .head{font-weight:800;margin-bottom:6px;font-size:16px}
.fb.ok .head{color:var(--ok)} .fb.ng .head{color:var(--ng)}
.expl{color:#dfe8f6;white-space:pre-wrap}
.link{color:var(--acc);text-decoration:none;font-size:14px;display:inline-block;margin-top:8px}
.opts{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.opt{flex:1;min-width:80px;text-align:center;padding:14px 8px;border-radius:14px;
  background:var(--card2);border:2px solid var(--line);cursor:pointer;font-weight:700}
.opt.sel{border-color:var(--acc);background:#1a2b4d;color:var(--acc)}
.grid{display:grid;grid-template-columns:1fr auto;gap:6px 14px;font-size:15px}
.big{font-size:44px;font-weight:900;letter-spacing:-1px}
.ring{display:flex;align-items:center;gap:18px}
.catrow{margin:12px 0}
.catbar{height:10px;background:var(--card2);border-radius:6px;overflow:hidden;margin-top:5px}
.catfill{height:100%;border-radius:6px}
.tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.tag{background:var(--card2);border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:13px}
.tag.wrong{border-color:#7a2733;color:#ffb3bc}
.hint{color:var(--mut);font-size:13px;margin-top:6px}
.hide{display:none!important}
.center{text-align:center}
.spacer{flex:1}
</style>
</head>
<body>
<div id="app">
  <div id="start" class="pad">
    <div style="height:calc(var(--safe-t) + 12px)"></div>
    <h1>SC-401 対策</h1>
    <div class="sub">Information Security Administrator ・ 全300問収録</div>
    <div class="card">
      <div style="font-weight:700;margin-bottom:2px">出題数</div>
      <div class="hint">3カテゴリから均等に出題します</div>
      <div class="opts" id="countOpts"></div>
      <div class="grid" style="margin-top:6px">
        <div>情報保護</div><div id="c1" class="center">–</div>
        <div>DLPと保持</div><div id="c2" class="center">–</div>
        <div>リスク管理</div><div id="c3" class="center">–</div>
      </div>
    </div>
    <div class="card">
      <label class="choice" id="fbToggle" style="border-style:solid">
        <div class="mark" id="fbMark">✓</div>
        <div class="ctxt"><b>1問ごとに正誤・解説を表示</b><div class="hint">オフにすると最後にまとめて採点</div></div>
      </label>
    </div>
    <button class="btn primary" id="startBtn">スタート</button>
    <div class="hint center" style="margin-top:14px">
      毎回シャッフルして出題。履歴は次回に持ち越しません。<br>
      Safariの共有 → 「ホーム画面に追加」でアプリのように使えます。
    </div>
  </div>

  <div id="quiz" class="hide">
    <div class="topbar">
      <div class="metarow"><span id="counter">1 / 100</span><span id="score">正答 0</span></div>
      <div class="progwrap"><div class="prog" id="prog"></div></div>
    </div>
    <div class="pad" style="flex:1">
      <div style="margin:6px 0 0">
        <span class="badge" id="catBadge">情報保護</span>
        <span class="badge multi hide" id="multiBadge">複数選択</span>
      </div>
      <div class="card">
        <div class="q" id="qtext"></div>
        <div class="choices" id="choices"></div>
        <div id="feedback"></div>
      </div>
      <button class="btn ghost" id="quitBtn" style="margin-bottom:20px">中断して結果を見る</button>
    </div>
    <div class="footbar"><button class="btn primary" id="actionBtn" disabled>回答する</button></div>
  </div>

  <div id="result" class="hide pad">
    <div style="height:calc(var(--safe-t) + 12px)"></div>
    <h1>結果</h1>
    <div class="card">
      <div class="ring">
        <div><div class="big" id="rPct">0%</div><div class="sub">正答率</div></div>
        <div class="spacer"></div>
        <div class="center"><div class="big" id="rNum">0/0</div><div class="sub">正答数</div></div>
      </div>
      <div id="verdict" style="margin-top:12px;font-weight:700"></div>
    </div>
    <div class="card"><h2 style="margin-top:0">カテゴリ別成績</h2><div id="catStats"></div></div>
    <div class="card" id="weakCard"><h2 style="margin-top:0">弱点</h2><div id="weak"></div></div>
    <div class="card" id="wrongCard">
      <h2 style="margin-top:0">誤答した問題番号</h2>
      <div id="wrongList" class="tags"></div>
      <div class="hint">番号は問題集（全300問）の通し番号です</div>
    </div>
    <button class="btn primary" id="againBtn">新しいセットに挑戦</button>
    <div style="height:10px"></div>
    <button class="btn ghost" id="reviewWrongBtn">誤答だけ復習する</button>
    <div style="height:10px"></div>
    <button class="btn ghost" id="reviewAllBtn">全問の解説を見る</button>
    <div style="height:calc(var(--safe-b) + 24px)"></div>
  </div>

  <div id="review" class="hide pad">
    <div style="height:calc(var(--safe-t) + 12px)"></div>
    <h1 id="revTitle">復習</h1>
    <div id="revBody"></div>
    <button class="btn primary" id="revBackBtn">結果に戻る</button>
    <div style="height:calc(var(--safe-b) + 24px)"></div>
  </div>
</div>

<script>
const QUESTIONS = [{"n": 1, "cat": "情報保護", "q": "あなたの会社のために、Microsoft Purview Advanced Message Encryption の機能をテストする必要があります。このテストでは、以下の情報を検証する必要があります。\n\n取得したデフォルトのテンプレート名\n\n暗号化と復号化の検証ステータス\nどの PowerShell コマンドレットを実行する必要がありますか？", "choices": {"A": "Test-OAuthConnectivity", "B": "Test-ClientAccessRule", "C": "Test-IRMConfiguration", "D": "Test-Mailflow"}, "answer": ["C"], "multi": false, "expl": "Test-IRMConfiguration は既定テンプレート名を取得し、Information Rights Management の暗号化・復号構成を検証します。", "url": "https://learn.microsoft.com/en-us/purview/manage-office-365-message-encryption"}, {"n": 2, "cat": "情報保護", "q": "Microsoft 365 E5サブスクリプションがあります。Microsoft WordおよびExcelドキュメントを含むMicrosoft SharePoint Onlineドキュメントライブラリがあります。これらのドキュメントには、次の種類の情報が含まれています。\n\nクレジットカード番号\n\n英国の物理的住所\n\n英国の国民保健サービス番号\n\n次の単語を含む機密プロジェクト: Project Tailspin、Project Contoso、Project Falcon\nMicrosoft Exchange Onlineには、次の種類の情報を含む電子メールメッセージがあります。\n\nクレジットカード番号\n\nユーザーサインイン資格情報\n\n英国の国民保健サービス番号\nコンプライアンスポリシーに機密情報の種類（SIT）を使用する予定です。すべての情報の種類を分類するために必要なSITの最小数はいくつですか？", "choices": {"A": "2", "B": "5", "C": "7", "D": "10"}, "answer": ["B"], "multi": false, "expl": "重複する情報種別は同じSITで検出できます。必要なのは、クレジットカード、英国住所、NHS番号、プロジェクト語、資格情報の5種類です。", "url": "https://learn.microsoft.com/en-us/purview/sit-sensitive-information-type-learn-about"}, {"n": 3, "cat": "情報保護", "q": "User1という名前のユーザーを含むMicrosoft 365 E5サブスクリプションがあります。添付ファイルを含むすべての電子メールメッセージが、Microsoft Purview Message Encryptionを使用して自動的に暗号化されるようにする必要があります。何を作成するべきですか？", "choices": {"A": "メールフロールール", "B": "秘密度ラベル", "C": "データ損失防止 (DLP) ポリシー", "D": "情報バリアセグメント"}, "answer": ["A"], "multi": false, "expl": "添付ファイルの有無を条件にし、暗号化アクションを適用するにはExchangeのメールフロールールを使用します。", "url": "https://learn.microsoft.com/en-us/purview/define-mail-flow-rules-to-encrypt-email"}, {"n": 4, "cat": "情報保護", "q": "Microsoft Purview Advanced Message Encryptionの実装を計画しています。外部の受信者に送信された暗号化されたメールが7日後に有効期限切れになるようにする必要があります。最初に何を作成する必要がありますか？", "choices": {"A": "メールフロールール", "B": "X.509バージョン3証明書", "C": "カスタムブランディングテンプレート", "D": "Microsoft Exchangeのリモートドメイン", "E": "Microsoft Exchangeのコネクタ"}, "answer": ["C"], "multi": false, "expl": "外部受信者向けのメッセージ有効期限はカスタムOME構成に設定するため、先にカスタムブランディングテンプレートを作成します。", "url": "https://learn.microsoft.com/en-us/purview/manage-office-365-message-encryption"}, {"n": 5, "cat": "情報保護", "q": "あなたの会社はMicrosoft 365 E5サブスクリプションを所有しており、Microsoft Purview Advanced Message Encryptionの使用を計画しています。会社の各製品グループは、暗号化された電子メールに標準のMicrosoft 365ロゴの代わりに、独自の製品ロゴを表示する必要があります。ブランディングテンプレートを作成するには何をする必要がありますか？", "choices": {"A": "RMSテンプレートを作成する。", "B": "トランスポートルールを作成する。", "C": "New-OMEConfiguration コマンドレットを実行する。", "D": "Set-IRMConfiguration コマンドレットを実行する。"}, "answer": ["C"], "multi": false, "expl": "New-OMEConfigurationで製品別のロゴなどを持つカスタムOME構成を作成します。", "url": "https://learn.microsoft.com/en-us/purview/manage-office-365-message-encryption"}, {"n": 6, "cat": "情報保護", "q": "会社にはMicrosoft 365テナントがあります。会社は毎年従業員評価を実施しています。評価結果は、Microsoft Wordテンプレートを使用して作成されたAssessmentTemplate.docxという名前のドキュメントに記録されます。従業員評価のコピーは、従業員とそのマネージャーに送信されます。評価のコピーは、メールボックス、Microsoft SharePoint Onlineサイト、およびOneDriveフォルダーに保存されます。各評価のコピーは、Assessmentsという名前のSharePoint Onlineフォルダーにも保存されます。従業員評価が外部ユーザーにメールで送信されないようにするデータ損失防止（DLP）ポリシーを作成する必要があります。ドキュメントフィンガープリントを使用して評価ドキュメントを識別します。ソリューションは作業を最小限に抑える必要があります。ソリューションには何を含める必要がありますか？", "choices": {"A": "AssessmentTemplate.docxのフィンガープリントを作成する。", "B": "完全データ一致（EDM）を使用する機密情報の種類を作成する。", "C": "Assessmentsフォルダーからシードフォルダーに100個のサンプルドキュメントをインポートする。", "D": "Assessmentsフォルダー内の100個のサンプルドキュメントのフィンガープリントを作成する。"}, "answer": ["A"], "multi": false, "expl": "共通テンプレート1つからフィンガープリントを作れば、そのテンプレートを使う完成済みフォームを検出できます。", "url": "https://learn.microsoft.com/en-us/purview/sit-document-fingerprinting"}, {"n": 7, "cat": "情報保護", "q": "User1という名前のユーザーを含むMicrosoft 365 E5テナントがあります。User1にはコンプライアンス管理者ロールが割り当てられています。User1は、「IP Address」という機密情報の種類における正規表現を表示できません。User1が正規表現を表示できるようにする必要があります。何をする必要がありますか？", "choices": {"A": "User1にグローバル閲覧者ロールを割り当てる。", "B": "User1をレビュー担当者ロールグループに割り当てる。", "C": "「IP Address」機密情報の種類のコピーを作成し、User1にそのコピーを編集するよう指示する。", "D": "User1に、機密情報の種類でテスト機能を使用するよう指示する。"}, "answer": ["C"], "multi": false, "expl": "組み込みSITの内部正規表現は直接表示できない場合があります。コピーを作成してカスタムSITとして編集すると構成を確認できます。", "url": "https://learn.microsoft.com/en-us/purview/sit-create-a-custom-sensitive-information-type"}, {"n": 8, "cat": "情報保護", "q": "機密情報タイプに使用される単語のリストが含まれたメールを受信します。キーワード辞書のソースとして使用できるファイルを作成する必要があります。リストはどの形式で保存する必要がありますか？", "choices": {"A": "Dictionaryという名前のテーブルを含むACCDBデータベースファイル", "B": "タブで区切られた単語を含むTSVファイル", "C": "カンマで区切られた単語を含むCSVファイル", "D": "最初の行の各セルに1つの単語を含むXLSXファイル"}, "answer": ["C"], "multi": false, "expl": "キーワード辞書用語はCSV形式のソースから取り込めます。", "url": "https://learn.microsoft.com/en-us/purview/sit-create-a-custom-sensitive-information-type"}, {"n": 9, "cat": "情報保護", "q": "Microsoft 365サブスクリプションがあります。新しいトレーニング可能な分類子を作成します。分類子をトレーニングする必要があります。分類子のトレーニングに使用できるソースはどれですか？", "choices": {"A": "オンプレミスのMicrosoft SharePoint Serverサイト", "B": "Azure Files共有", "C": "Microsoft SharePoint Onlineサイト", "D": "NFSファイル共有"}, "answer": ["C"], "multi": false, "expl": "カスタム分類子のトレーニングデータはMicrosoft 365内のSharePoint Onlineサイトに保存します。", "url": "https://learn.microsoft.com/en-us/purview/trainable-classifiers-learn-about"}, {"n": 10, "cat": "情報保護", "q": "機密情報を保護するためにデータ損失防止(DLP)を使用するMicrosoft 365 E5サブスクリプションがあります。Form.docxという名前のドキュメントがあります。PowerShellを使用して、Form.docxに基づくドキュメントフィンガープリントを作成する予定です。最初にサブスクリプションに接続する必要があります。どのコマンドレットを実行する必要がありますか？", "choices": {"A": "Connect-IPPSSession", "B": "Connect-SPOService", "C": "Connect-ExchangeOnline", "D": "Connect-MgGraph"}, "answer": ["A"], "multi": false, "expl": "文書フィンガープリントのSITをPowerShellで作成する処理はSecurity & Compliance PowerShellへ接続して実行します。", "url": "https://learn.microsoft.com/en-us/purview/sit-document-fingerprinting"}, {"n": 11, "cat": "情報保護", "q": "Microsoft 365 E5 サブスクリプションがあり、Channel1 という名前の Microsoft Teams チャネルが含まれています。Channel1 には研究開発ドキュメントが含まれています。サブスクリプションに Microsoft 365 Copilot を実装する予定です。Channel1 に保存されているファイルの内容が、Copilot によって生成された回答に含まれ、権限のないユーザーに表示されるのを防ぐ必要があります。何を使用する必要がありますか？", "choices": {"A": "秘密度ラベル", "B": "コミュニケーションコンプライアンスポリシー", "C": "Microsoft Purview のインサイダーリスク管理", "D": "Microsoft Purview の情報バリア (IB)"}, "answer": ["A"], "multi": false, "expl": "暗号化を含む秘密度ラベルは、許可されたユーザーだけが内容を復号できるようにし、Copilotもそのアクセス制御を尊重します。", "url": "https://learn.microsoft.com/en-us/purview/encryption-sensitivity-labels"}, {"n": 12, "cat": "情報保護", "q": "Microsoft 365サブスクリプションがあり、Site1とSite2という名前の2つのMicrosoft SharePoint Onlineサイトが含まれています。ポリシーを使用して、次の要件を満たすことを計画しています。\n\nドキュメントにProject1またはProject2という単語が含まれている場合、ドキュメントに社外秘の透かしを追加する。\n\nドキュメントにクレジットカード情報が含まれている場合、ドキュメントを7年間保持する。\n\nSite2に保存されているすべてのドキュメントに内部使用のみの透かしを追加する。\n\nSite1に保存されているすべてのドキュメントに社外秘の透かしを追加する。\n必要な機密情報タイプの最小数を推奨する必要があります。推奨する機密情報タイプの数はいくつですか？", "choices": {"A": "1", "B": "2", "C": "3", "D": "4"}, "answer": ["B"], "multi": false, "expl": "Project語を検出するカスタムSITと、クレジットカードを検出する組み込みSITの2種類が必要です。サイト単位の透かしはSITを追加せずラベルのスコープで実装できます。", "url": "https://learn.microsoft.com/en-us/purview/sit-sensitive-information-type-learn-about"}, {"n": 13, "cat": "情報保護", "q": "Microsoft 365テナントがあります。次を作成します: ・秘密度ラベル ・自動ラベル付けポリシー。自動ラベル付けポリシーによって検出されたすべてのデータに秘密度ラベルが適用されるようにする必要があります。最初に何をすべきですか？", "choices": {"A": "Enable-TransportRuleコマンドレットを実行する。", "B": "インサイダーリスク管理を有効にする。", "C": "トレーニング可能な分類子を作成する。", "D": "シミュレーションモードでポリシーを実行する。"}, "answer": ["D"], "multi": false, "expl": "テナント側の自動ラベル付けポリシーはまずシミュレーションで一致を確認し、その後に有効化します。", "url": "https://learn.microsoft.com/en-us/purview/apply-sensitivity-label-automatically"}, {"n": 14, "cat": "情報保護", "q": "Microsoft Purview Message Encryptionを使用するMicrosoft 365テナントがあります。user1@contoso.comに送信される、添付ファイルを含むすべての電子メールが、Microsoft Purview Message Encryptionを使用して自動的に暗号化されるようにする必要があります。何をする必要がありますか？", "choices": {"A": "Exchange 管理センターから、メールフロールールを作成する。", "B": "Exchange 管理センターから、新しい共有ポリシーを作成する。", "C": "Microsoft Defender ポータルから、安全な添付ファイルポリシーを作成する。", "D": "Microsoft Purview ポータルから、自動適用保持ラベルポリシーを構成する。"}, "answer": ["A"], "multi": false, "expl": "受信者と添付ファイルの有無を条件にするExchangeメールフロールールで自動暗号化します。", "url": "https://learn.microsoft.com/en-us/purview/define-mail-flow-rules-to-encrypt-email"}, {"n": 15, "cat": "情報保護", "q": "Site1という名前のMicrosoft SharePoint Onlineサイトがあり、ドキュメントライブラリが含まれています。このライブラリには1,000を超えるドキュメントが含まれています。ドキュメントの一部は求職者の履歴書です。すべてのドキュメントは英語です。履歴書として識別されたドキュメントに秘密度ラベルを自動的に適用する予定です。職歴、学歴、および実績が含まれるドキュメントのみを自動的にラベル付けする必要があります。履歴書を識別して分類する必要があります。この解決策は、管理作業を最小限に抑える必要があります。解決策には何を含めるべきですか？", "choices": {"A": "トレーニング可能な分類子", "B": "キーワード辞書", "C": "関数", "D": "完全なデータ一致 (EDM) 分類子"}, "answer": ["A"], "multi": false, "expl": "履歴書のように意味と文脈で識別する文書カテゴリには、機械学習を使うトレーニング可能な分類子が適します。", "url": "https://learn.microsoft.com/en-us/purview/trainable-classifiers-learn-about"}, {"n": 16, "cat": "情報保護", "q": "Contosoでは、秘密度ラベル「社外秘」を適用した文書を社外の契約社員にも共有します。契約終了後にアクセス権を取り消した場合、その変更が一定期間内に暗号化済み文書へ反映されるようにする必要があります。秘密度ラベルで構成すべき設定はどれですか。", "choices": {"A": "コンテンツの有効期限を設定する", "B": "オフラインアクセスを許可する日数を制限する", "C": "透かしを追加する", "D": "ラベルの色を変更する"}, "answer": ["B"], "multi": false, "expl": "暗号化されたコンテンツのオフラインアクセス期間が終了すると、ユーザーはオンラインで権限を再取得する必要があります。後から行った権限変更や取り消しを反映するには、オフラインアクセス期間を制限します。", "url": "https://learn.microsoft.com/en-us/purview/encryption-sensitivity-labels"}, {"n": 17, "cat": "情報保護", "q": "Contosoは、文書に含まれる従業員番号が人事データベースに実在する場合だけ高い精度で検出したいと考えています。使用すべき分類方法はどれですか。", "choices": {"A": "キーワード辞書だけを使用するカスタムSIT", "B": "ドキュメントフィンガープリント", "C": "Exact Data Match（EDM）ベースのSIT", "D": "トレーニング可能な分類子"}, "answer": ["C"], "multi": false, "expl": "EDMベースのSITは、ハッシュ化してアップロードした実データの値とコンテンツを照合します。実在する識別子だけを高精度で検出する要件に適します。", "url": "https://learn.microsoft.com/en-us/purview/sit-learn-about-exact-data-match-based-sits"}, {"n": 18, "cat": "情報保護", "q": "ContosoはMicrosoft Teams Premiumを使用しています。機密性の高いTeams会議について、ロビーをバイパスできるユーザー、録画、会議チャット、画面共有の透かしを、会議の機密区分に応じて一貫して制御する必要があります。何を使用すべきですか。", "choices": {"A": "Teamsの会議テンプレートだけを使用する", "B": "Teams会議とチャットを保護する秘密度ラベルを使用する", "C": "Exchangeのメールフロールールを使用する", "D": "保持ラベルを使用する"}, "answer": ["B"], "multi": false, "expl": "会議向けの秘密度ラベルは、ロビーバイパス、発表者、録画と文字起こし、会議チャット、ビデオや画面共有の透かしなどのTeams会議設定を適用できます。", "url": "https://learn.microsoft.com/en-us/purview/sensitivity-labels-meetings"}, {"n": 19, "cat": "情報保護", "q": "Contosoでは、「社外秘」秘密度ラベルを適用したOffice文書の各ページに分類を視覚的に表示する必要があります。秘密度ラベルで構成できる設定はどれですか。", "choices": {"A": "ページ番号", "B": "ヘッダー、フッター、透かし", "C": "ファイルアイコン", "D": "フォントテーマ"}, "answer": ["B"], "multi": false, "expl": "秘密度ラベルのコンテンツマーキングでは、Office文書にヘッダー、フッター、透かしを追加できます。", "url": "https://learn.microsoft.com/en-us/purview/create-sensitivity-labels"}, {"n": 20, "cat": "情報保護", "q": "Contosoでは、ユーザーが文書に「特定受信者のみ」ラベルを適用するとき、閲覧を許可する受信者をその場で指定できるようにする必要があります。どの暗号化設定を使用すべきですか。", "choices": {"A": "ユーザー定義のアクセス許可", "B": "管理者定義のアクセス許可", "C": "Double Key Encryption", "D": "オフラインアクセスを許可しない"}, "answer": ["A"], "multi": false, "expl": "ユーザー定義のアクセス許可を構成すると、ラベルを適用するユーザーがアクセスを許可する相手や権限を指定できます。", "url": "https://learn.microsoft.com/en-us/purview/encryption-sensitivity-labels"}, {"n": 21, "cat": "情報保護", "q": "Contosoは、社内固有の識別番号を検出するカスタムの機密情報の種類を作成する予定です。パターンと裏付け証拠の定義に使用できる要素はどれですか。", "choices": {"A": "ファイルの作成日時だけ", "B": "ファイル拡張子だけ", "C": "正規表現、キーワード辞書、関数", "D": "ファイル所有者だけ"}, "answer": ["C"], "multi": false, "expl": "カスタムSITは、正規表現、キーワード、キーワード辞書、組み込み関数などをプライマリ要素や裏付け証拠として組み合わせられます。", "url": "https://learn.microsoft.com/en-us/purview/sit-create-a-custom-sensitive-information-type"}, {"n": 22, "cat": "情報保護", "q": "Contosoでは、ユーザーがOffice文書を保存するかメールを送信する前に、必ず秘密度ラベルを選択する必要があります。ラベルポリシーで何を有効にすべきですか。", "choices": {"A": "推奨ラベル付け", "B": "既定のラベル", "C": "必須ラベル付け", "D": "自動ラベル付け"}, "answer": ["C"], "multi": false, "expl": "必須ラベル付けを有効にすると、サポートされるアプリで文書の保存やメール送信前に秘密度ラベルの適用が要求されます。", "url": "https://learn.microsoft.com/en-us/purview/create-sensitivity-labels"}, {"n": 23, "cat": "情報保護", "q": "Contosoは、Microsoft単独では復号できない最重要文書をクラウドで保護する必要があります。文書を開くにはContosoとMicrosoftが管理する2つのキーの両方を必要とする方式はどれですか。", "choices": {"A": "Microsoft Purview Message Encryption", "B": "Customer Key", "C": "Double Key Encryption", "D": "BitLocker"}, "answer": ["C"], "multi": false, "expl": "DKEは、顧客が管理するキーとMicrosoft Azureに格納されるキーの両方を使用し、復号には両方が必要です。", "url": "https://learn.microsoft.com/en-us/purview/double-key-encryption"}, {"n": 24, "cat": "情報保護", "q": "Contosoは、クレジットカード番号を含むExchange、SharePoint、OneDriveのコンテンツへ「機密」秘密度ラベルをサービス側で自動適用する必要があります。何を作成すべきですか。", "choices": {"A": "ラベル発行ポリシー", "B": "既定ラベルを構成したラベルポリシー", "C": "SITを条件とする自動ラベル付けポリシー", "D": "保持ラベルの自動適用ポリシー"}, "answer": ["C"], "multi": false, "expl": "サービス側の自動ラベル付けポリシーでは、SITなどの条件に一致するExchange、SharePoint、OneDriveのコンテンツへ秘密度ラベルを自動適用できます。", "url": "https://learn.microsoft.com/en-us/purview/apply-sensitivity-label-automatically"}, {"n": 25, "cat": "情報保護", "q": "ContosoはMicrosoft 365 E5を使用しています。情報保護管理者はMicrosoft Purviewでデータ保護を構成しています。\n\nEDM の SIT のスキーマルールバンドルで、保護対象データを一意に識別する列を指定したい。どの属性を選ぶか？", "choices": {"A": "Primary element（プライマリ要素）", "B": "Auxiliary element（補助要素）", "C": "Data classification（データ分類）", "D": "Confidence scoring（信頼度スコア）"}, "answer": ["A"], "multi": false, "expl": "EDMスキーマでは、各レコードを一意に識別する列をプライマリ要素として指定します。", "url": "https://learn.microsoft.com/en-us/purview/sit-learn-about-exact-data-match-based-sits"}, {"n": 26, "cat": "情報保護", "q": "Contoso（Microsoft 365 E5）。新しいキーワード辞書を組み込みたい。どの機能を構成するか？", "choices": {"A": "保持ポリシー", "B": "機密情報の種類", "C": "トレーニング可能な分類子", "D": "秘密度ラベル"}, "answer": ["B"], "multi": false, "expl": "キーワード辞書はカスタムSITの作成時に構成する。", "url": "https://learn.microsoft.com/en-us/purview/sit-create-a-custom-sensitive-information-type"}, {"n": 27, "cat": "情報保護", "q": "物流企業。休暇申請は \"leave-request-template.dotx\" テンプレートで提出。アクセスは給与チームのみに制限したい。ドキュメントフィンガープリントで実装し、PowerShellで分類ルールパッケージを作成しDLPに適用したが、期待通り機能しない。正しく動作させるには？", "choices": {"A": "leave-request-template.dotx を .docx に変換する", "B": "全社員に休暇申請ファイルをパスワード保護させる", "C": "フィンガープリント作成後に元フォームのテキストを減らす", "D": "最低50個の休暇申請サンプルを収集する"}, "answer": ["A"], "multi": false, "expl": "ドキュメントフィンガープリントはテンプレート(.dotx)を直接サポートしないため .docx に変換。", "url": "https://learn.microsoft.com/en-us/purview/sit-document-fingerprinting"}, {"n": 28, "cat": "情報保護", "q": "ContosoはMicrosoft 365 E5を使用しています。情報保護管理者はMicrosoft Purv ": "定型テンプレートの識別はドキュメントフィンガープリント。", "url": "https://learn.microsoft.com/en-us/purview/sit-document-fingerprinting"}, {"n": 64, "cat": "情報保護", "q": "ContosoはMicrosoft 365 E5を使用しています。情報保護管理者はMicrosoft Purviewでデータ保護を構成しています。\n\nカスタムのトレーニング可能な分類子のトレーニングデータ準備の手順は？", "choices": {"A": "キーワードのCSVを作成しSharePointにアップロード", "B": "最低150件の否定例をSharePointに配置", "C": "肯定例10件・否定例10件をOneDriveに保存", "D": "肯定例50件以上・否定例150件以上を別々のSharePointフォルダーに保存"}, "answer": ["D"], "multi": false, "expl": "カスタム分類子のトレーニングには、肯定例を50件以上、否定例を150件以上用意し、それぞれ別のSharePoint Onlineフォルダーへ保存します。", "url": "https://learn.microsoft.com/en-us/purview/trainable-classifiers-get-started-with"}, {"n": 65, "cat": "情報保護", "q": "ContosoはMicrosoft 365 E5を使用しています。情報保護管理者はMicrosoft Purviewでデータ保護を構成しています。\n\nコンプライアンス担当者が秘密度ラベルポリシーを作成できるよう、最小権限で付与すべき3ロールは？", "choices": {"A": "Security Operator", "B": "Security Administrator", "C": "Compliance Administrator", "D": "Compliance Data Administrator", "E": "Global Administrator", "F": "Sensitivity Label Reader"}, "answer": ["B", "C", "D"], "multi": true, "expl": "秘密度ラベルを管理できる組み込みロールグループとして、Security Administrator、Compliance Administrator、Compliance Data Administratorを使用できます。", "url": "https://learn.microsoft.com/en-us/purview/get-started-with-sensitivity-labels"}, {"n": 66, "cat": "情報保護", "q": "Contosoは、スキャンされた請求書画像に含まれるクレジットカード番号を既存のDLPポリシーで検出する必要があります。OCRを有効にした後、分類方法をどのように変更すべきですか。", "choices": {"A": "OCR専用のSITを新規作成する", "B": "既存のクレジットカード番号SITをそのまま使用する", "C": "すべての画像をPDFへ変換する", "D": "ドキュメントフィンガープリントだけを使用する"}, "answer": ["B"], "multi": false, "expl": "Microsoft Purview OCRを構成すると、既存のSIT、EDMベースのSIT、トレーニング可能な分類子、ドキュメントフィンガープリントを画像にも使用できます。OCR専用分類子は不要です。", "url": "https://learn.microsoft.com/en-us/purview/ocr-learn-about"}, {"n": 67, "cat": "情報保護", "q": "Contosoは、Exchange、SharePoint、OneDrive、Teams、およびエンドポイント上の画像から機密情報を検出する予定です。OCRをテナントで使用するために必要な追加構成はどれですか。", "choices": {"A": "各ユーザーへPower BI Proを割り当てる", "B": "Azureの従量課金請求を構成する", "C": "Exchangeハイブリッドを構成する", "D": "画像ごとに保持ラベルを適用する"}, "answer": ["B"], "multi": false, "expl": "Microsoft Purview OCRはテナントレベルで構成し、対応するAzureの従量課金請求を設定します。これによりPurviewの分類子が画像内テキストを評価できます。", "url": "https://learn.microsoft.com/en-us/purview/ocr-learn-about"}, {"n": 68, "cat": "情報保護", "q": "法務部門は、eDiscoveryケース内のスキャンPDFと画像を検索対象に含める必要があります。他のケースには同じ処理を適用しません。OCRはどの単位で構成すべきですか。", "choices": {"A": "eDiscoveryケース単位", "B": "保持ラベル単位", "C": "テナント内の全ユーザー単位", "D": "監査保持ポリシー単位"}, "answer": ["A"], "multi": false, "expl": "eDiscoveryではOCRをケースレベルの検索および分析設定として構成できます。対象ケースだけで画像から抽出したテキストを検索へ利用できます。", "url": "https://learn.microsoft.com/en-us/purview/ocr-learn-about"}, {"n": 69, "cat": "情報保護", "q": "Contosoは、Windowsのエクスプローラーから非Officeファイルへ秘密度ラベルと暗号化を適用できるようにする必要があります。Information Protectionクライアントのどのコンポーネントを使用しますか。", "choices": {"A": "Information Protectionビューアー", "B": "Information Protectionスキャナー", "C": "Content Explorer", "D": "Information Protectionファイルラベラー"}, "answer": ["D"], "multi": false, "expl": "ファイルラベラーは、ファイルエクスプローラーからファイルへ秘密度ラベルや暗号化を適用するためのクライアントコンポーネントです。", "url": "https://learn.microsoft.com/en-us/purview/information-protection-client"}, {"n": 70, "cat": "情報保護", "q": "ユーザーは、Windowsで暗号化された保護対象ファイルを内容変更せず閲覧する必要があります。使用すべきInformation Protectionクライアントのコンポーネントはどれですか。", "choices": {"A": "ファイルラベラー", "B": "Information Protectionビューアー", "C": "スキャナー", "D": "Activity Explorer"}, "answer": ["B"], "multi": false, "expl": "Information Protectionビューアーは、対応アプリがない場合を含め、暗号化された保護対象ファイルを閲覧するために使用します。", "url": "https://learn.microsoft.com/en-us/purview/information-protection-client"}, {"n": 71, "cat": "情報保護", "q": "ContosoはMicrosoft 365 Appsの最新版を使用しています。Office文書のラベル付けのために、退役済みのAzure Information Protection Officeアドインを再展開する案が提示されました。採用すべき対応はどれですか。", "choices": {"A": "Officeに組み込まれた秘密度ラベル機能を使用する", "B": "旧アドインを全端末へ再展開する", "C": "Office文書にはラベルを使用しない", "D": "保持ラベルで置き換える"}, "answer": ["A"], "multi": false, "expl": "Azure Information Protection統合ラベル付けクライアントのWindows Officeアドインは退役しており、対応するMicrosoft 365 Appsの組み込みラベル付けを使用します。", "url": "https://learn.microsoft.com/en-us/purview/sensitivity-labels-office-apps"}, {"n": 72, "cat": "情報保護", "q": "管理者はWindowsファイルサーバー上の選択したファイルへ、スクリプトから秘密度ラベルを適用する必要があります。使用すべきコマンドレットはどれですか。", "choices": {"A": "Set-RetentionCompliancePolicy", "B": "New-DlpCompliancePolicy", "C": "Set-FileLabel", "D": "Search-UnifiedAuditLog"}, "answer": ["C"], "multi": false, "expl": "PurviewInformationProtection PowerShellモジュールのSet-FileLabelは、ファイルへ秘密度ラベルを適用、変更、または削除する処理に使用できます。", "url": "https://learn.microsoft.com/en-us/purview/encryption-super-users"}, {"n": 73, "cat": "情報保護", "q": "Contosoはオンプレミスのファイル共有に保存されたファイルを検出し、分類して秘密度ラベルを適用する必要があります。使用すべきコンポーネントはどれですか。", "choices": {"A": "eDiscovery検索", "B": "Audit (Premium)", "C": "Exchangeメールフロールール", "D": "Information Protectionスキャナー"}, "answer": ["D"], "multi": false, "expl": "Information ProtectionスキャナーはWindows Server上のサービスとして動作し、オンプレミスのファイル共有やSharePoint Serverのファイルを検出、分類、保護します。", "url": "https://learn.microsoft.com/en-us/purview/deploy-scanner"}, {"n": 74, "cat": "情報保護", "q": "ContosoはInformation Protectionスキャナーを展開します。スキャナーサービスをインストールする場所として適切なものはどれですか。", "choices": {"A": "Windows Server", "B": "Exchange Onlineメールボックス", "C": "Microsoft Teamsチーム", "D": "Azure Storageコンテナーだけ"}, "answer": ["A"], "multi": false, "expl": "Information ProtectionスキャナーはWindows Serverにインストールしてサービスとして実行します。対象リポジトリへネットワークアクセスできるようにします。", "url": "https://learn.microsoft.com/en-us/purview/deploy-scanner"}, {"n": 75, "cat": "情報保護", "q": "ContosoはオンプレミスのSMBファイル共有とSharePoint Serverライブラリにあるファイルを一括分類する必要があります。最小の管理作業で要件を満たすものはどれですか。", "choices": {"A": "Exchange Onlineへ全ファイルを添付して送信する", "B": "Information Protectionスキャナーのリポジトリとして両方を追加する", "C": "eDiscoveryレビューセットへ全ファイルを追加する", "D": "Endpoint DLPだけを有効化する"}, "answer": ["B"], "multi": false, "expl": "Information Protectionスキャナーは、オンプレミスのネットワーク共有とSharePoint Serverのドキュメントライブラリをリポジトリとしてスキャンできます。", "url": "https://learn.microsoft.com/en-us/purview/deploy-scanner"}, {"n": 76, "cat": "情報保護", "q": "Contosoは、オンプレミスファイルへ変更を加える前に、どのファイルが分類ルールへ一致するかだけを評価したいと考えています。スキャナーをどのモードで実行すべきですか。", "choices": {"A": "強制モード", "B": "処分レビューモード", "C": "検出モード", "D": "eDiscovery保留モード"}, "answer": ["C"], "multi": false, "expl": "検出モードではファイルを変更せず、分類結果と推奨される処理をレポートできます。結果を確認した後にラベル付けや保護を強制します。", "url": "https://learn.microsoft.com/en-us/purview/deploy-scanner-manage"}, {"n": 77, "cat": "情報保護", "q": "Information Protectionスキャナーの初回スキャンが完了しました。構成を変更せずに次のスキャンを開始した場合、既定で主に評価されるファイルはどれですか。", "choices": {"A": "暗号化済みファイルだけ", "B": "全ファイルが必ず再評価される", "C": "前回エラーになったファイルだけ", "D": "新規または変更されたファイル"}, "answer": ["D"], "multi": false, "expl": "初回は対象リポジトリをすべて評価します。以後の通常スキャンは、新規または変更されたファイルを対象とする増分スキャンです。", "url": "https://learn.microsoft.com/en-us/purview/deploy-scanner-manage"}, {"n": 78, "cat": "情報保護", "q": "Contosoは秘密度ラベルの条件を変更しました。既存ファイルを含む全リポジトリへ新しい条件を再評価する必要があります。何を実行すべきですか。", "choices": {"A": "Rescan all filesを実行する", "B": "監査保持ポリシーを再作成する", "C": "保持ラベルを再発行する", "D": "eDiscoveryケースを閉じる"}, "answer": ["A"], "multi": false, "expl": "設定変更後に既存ファイルを含めて再評価するには、管理ポータルからRescan all filesを実行して完全スキャンを開始します。", "url": "https://learn.microsoft.com/en-us/purview/deploy-scanner-manage"}, {"n": 79, "cat": "情報保護", "q": "Information Protectionスキャナーを既定設定で展開しました。保護対象となるファイル種類について正しい説明はどれですか。", "choices": {"A": "画像ファイルだけが対象である", "B": "OfficeファイルとPDFが既定の保護対象である", "C": "すべての拡張子が自動的に暗号化される", "D": "ZIPファイルだけが対象である"}, "answer": ["B"], "multi": false, "expl": "スキャナーは既定でOfficeファイルとPDFを保護します。追加の拡張子や全ファイル種類を保護するにはラベルポリシーの高度な設定を構成します。", "url": "https://learn.microsoft.com/en-us/purview/deploy-scanner-configure-install"}, {"n": 80, "cat": "情報保護", "q": "Contosoは、既定のOfficeとPDFに加えて.xmlファイルもスキャナーで保護する必要があります。どの構成を変更すべきですか。", "choices": {"A": "監査保持ポリシーのRecordTypes", "B": "DLPポリシーのTeams場所", "C": "ラベルポリシーのPFileSupportedExtensions高度な設定", "D": "eDiscoveryケースのOCR設定"}, "answer": ["C"], "multi": false, "expl": "スキャナーが保護する追加拡張子は、対象ラベルポリシーのPFileSupportedExtensions高度な設定で指定します。", "url": "https://learn.microsoft.com/en-us/purview/deploy-scanner-configure-install"}, {"n": 81, "cat": "情報保護", "q": "コンプライアンス担当者は、特定のSITが検出されたSharePointアイテムの場所と実際のコンテンツを確認する必要があります。どのツールを使用すべきですか。", "choices": {"A": "Activity Explorer", "B": "Service health", "C": "Secure Score", "D": "Content Explorer"}, "answer": ["D"], "multi": false, "expl": "Content Explorerは、検出されたSIT、秘密度ラベル、保持ラベルなどを場所別に確認し、権限があれば実際のアイテム内容を表示できます。", "url": "https://learn.microsoft.com/en-us/purview/data-classification-content-explorer"}, {"n": 82, "cat": "情報保護", "q": "Contosoは、ユーザーが秘密度ラベルをダウングレードした操作とEndpoint DLPで検出された印刷操作を調査する必要があります。どのツールを使用すべきですか。", "choices": {"A": "Activity Explorer", "B": "Content Explorer", "C": "eDiscoveryレビューセット", "D": "Microsoft 365利用状況レポート"}, "answer": ["A"], "multi": false, "expl": "Activity Explorerは、ラベルの適用・変更・削除やDLP関連のユーザーアクティビティをフィルターして調査するために使用します。", "url": "https://learn.microsoft.com/en-us/purview/data-classification-activity-explorer"}, {"n": 83, "cat": "情報保護", "q": "User1はContent Explorerで分類別の件数と保存場所だけを確認します。個々のファイル内容は表示できないようにする必要があります。付与すべきロールはどれですか。", "choices": {"A": "Content Explorer Content Viewer", "B": "Content Explorer List Viewer", "C": "eDiscovery Administrator", "D": "Insider Risk Management Investigator"}, "answer": ["B"], "multi": false, "expl": "List Viewerは分類結果の場所や件数を参照する権限です。実際のアイテム内容を開くContent Viewerは付与しません。", "url": "https://learn.microsoft.com/en-us/purview/data-classification-content-explorer"}, {"n": 84, "cat": "情報保護", "q": "User1はContent Explorerで検出結果の一覧を確認できますが、サンプル文書を開けません。業務上、実際の内容を確認する必要があります。追加すべきロールはどれですか。", "choices": {"A": "Reports Reader", "B": "Security Operator", "C": "Content Explorer Content Viewer", "D": "Retention Management"}, "answer": ["C"], "multi": false, "expl": "分類されたアイテムの実際の内容をContent Explorerで表示するには、Content Explorer Content Viewerロールが必要です。", "url": "https://learn.microsoft.com/en-us/purview/data-classification-content-explorer"}, {"n": 85, "cat": "情報保護", "q": "User1は秘密度ラベルとラベルポリシーを作成・変更しますが、他のPurviewソリューションは管理しません。最小権限として適切なロールはどれですか。", "choices": {"A": "Global Administrator", "B": "eDiscovery Manager", "C": "Insider Risk Management Analyst", "D": "Information Protection Admin"}, "answer": ["D"], "multi": false, "expl": "Information Protection Adminは、秘密度ラベルと関連ポリシーを管理するための限定されたPurviewロールです。Global Administratorより最小権限です。", "url": "https://learn.microsoft.com/en-us/purview/purview-permissions"}, {"n": 86, "cat": "情報保護", "q": "Contosoは、文書とメール用の保護設定とは別に、TeamsチームとMicrosoft 365グループのプライバシーを制御するラベルを作成します。ラベルで追加すべきスコープはどれですか。", "choices": {"A": "Groups & sites", "B": "Schematized data assetsだけ", "C": "Meetingsだけ", "D": "Azure resources"}, "answer": ["A"], "multi": false, "expl": "Teamsチーム、Microsoft 365グループ、SharePointサイトなどのコンテナー設定を制御するには、秘密度ラベルへGroups & sitesスコープを含めます。", "url": "https://learn.microsoft.com/en-us/purview/sensitivity-labels-teams-groups-sites"}, {"n": 87, "cat": "情報保護", "q": "Contosoは「機密チーム」ラベルをTeamsチームへ適用しました。ラベルには外部共有とプライバシー設定だけが構成されています。チームのSharePointサイト内に既にある全ファイルはどうなりますか。", "choices": {"A": "全ファイルが自動的に暗号化される", "B": "コンテナーラベルだけではファイルへ同じラベルは自動適用されない", "C": "全ファイルが自動削除される", "D": "全ファイルへ保持ラベルが適用される"}, "answer": ["B"], "multi": false, "expl": "コンテナーへ適用した秘密度ラベルはチーム、グループ、サイトの設定を保護しますが、保存済みファイルへ同じ秘密度ラベルを自動適用するものではありません。", "url": "https://learn.microsoft.com/en-us/purview/sensitivity-labels-teams-groups-sites"}, {"n": 88, "cat": "情報保護", "q": "Contosoは、Teamsチーム作成時に公開／非公開、外部ユーザーアクセス、非管理デバイスからのアクセスを機密区分に応じて制御する必要があります。使用すべき機能はどれですか。", "choices": {"A": "保持ラベル", "B": "監査保持ポリシー", "C": "Groups & sitesスコープの秘密度ラベル", "D": "eDiscovery保留"}, "answer": ["C"], "multi": false, "expl": "コンテナー向け秘密度ラベルは、グループのプライバシー、外部ユーザーアクセス、外部共有、非管理デバイスからのアクセスなどを制御できます。", "url": "https://learn.microsoft.com/en-us/purview/sensitivity-labels-teams-groups-sites"}, {"n": 89, "cat": "情報保護", "q": "Contosoは、特定の機密チームで開催されるすべてのチャネル会議とチャットへ同じ会議保護設定を強制する必要があります。最初に何を構成すべきですか。", "choices": {"A": "会議ごとに保持ラベルを適用する", "B": "Exchange監査保持ポリシーを作成する", "C": "チームをeDiscovery保留にする", "D": "Groups & sitesラベルへ会議用秘密度ラベルを関連付ける"}, "answer": ["D"], "multi": false, "expl": "チャネル会議では、コンテナー用ラベルに会議・チャット保護用の秘密度ラベルを関連付けることで、チームのチャネル会議とチャットへ設定を継承できます。", "url": "https://learn.microsoft.com/en-us/purview/sensitivity-labels-meetings"}, {"n": 90, "cat": "情報保護", "q": "ContosoはTeams会議の招待、添付ファイル、会議本体、チャットを同じ秘密度ラベルで保護します。ラベルに必要なスコープの組み合わせはどれですか。", "choices": {"A": "Files、Emails、Meetings", "B": "Groups & sitesだけ", "C": "Meetingsだけ", "D": "Filesだけ"}, "answer": ["A"], "multi": false, "expl": "会議は招待、応答、添付、メール、Teams会議で構成されるため、会議保護用ラベルにはFiles、Emails、Meetingsの各スコープが必要です。", "url": "https://learn.microsoft.com/en-us/purview/sensitivity-labels-meetings"}, {"n": 91, "cat": "情報保護", "q": "ContosoはPower BIの機密レポートをサポートされるExcel形式へエクスポートした後も、分類と保護を維持する必要があります。使用すべき機能はどれですか。", "choices": {"A": "監査保持ポリシーを適用する", "B": "Power BIアイテムへ秘密度ラベルを適用する", "C": "eDiscovery保留を作成する", "D": "Endpoint DLPを無効にする"}, "answer": ["B"], "multi": false, "expl": "Power BIの秘密度ラベルは対応するエクスポート先へ継承され、サポートされるファイルで分類と保護を維持できます。", "url": "https://learn.microsoft.com/en-us/fabric/enterprise/powerbi/service-security-sensitivity-label-overview"}, {"n": 92, "cat": "情報保護", "q": "Contosoは、接続済みクラウドアプリに保存されたファイルを継続的に評価し、条件に一致したファイルへMicrosoft Purview秘密度ラベルを適用する必要があります。何を使用すべきですか。", "choices": {"A": "監査保持ポリシー", "B": "Teams保持ポリシー", "C": "Defender for Cloud Appsのファイルポリシー", "D": "eDiscoveryレビューセット"}, "answer": ["C"], "multi": false, "expl": "Defender for Cloud Appsのファイルポリシーは接続済みアプリの保存済みファイルを継続評価し、ガバナンスアクションとしてPurview秘密度ラベルを適用できます。", "url": "https://learn.microsoft.com/en-us/defender-cloud-apps/apply-purview-labels"}, {"n": 93, "cat": "情報保護", "q": "Contosoから暗号化メールを受信した外部ユーザーはMicrosoftアカウントを持っていません。外部ユーザーがメッセージを閲覧するために利用できる方法はどれですか。", "choices": {"A": "ContosoのVPNへ必ず接続する", "B": "メッセージを平文で再送してもらう", "C": "SharePoint管理者になる", "D": "ワンタイムパスコードを使用する"}, "answer": ["D"], "multi": false, "expl": "Microsoft Purview Message Encryptionでは、外部受信者はサポートされるアカウントで認証するか、ワンタイムパスコードを使用して暗号化メッセージを閲覧できます。", "url": "https://learn.microsoft.com/en-us/purview/ome"}, {"n": 94, "cat": "情報保護", "q": "Contosoは外部受信者へ送信済みの暗号化メールについて、誤送信が判明した後に閲覧を停止できるようにする必要があります。使用すべき機能はどれですか。", "choices": {"A": "Advanced Message Encryptionのメッセージ失効", "B": "保持ポリシーの削除", "C": "監査ログの消去", "D": "DLPシミュレーション"}, "answer": ["A"], "multi": false, "expl": "Advanced Message Encryptionでは、管理者が外部受信者向けに送信済みの暗号化メッセージを失効させ、以後の閲覧を防止できます。", "url": "https://learn.microsoft.com/en-us/purview/manage-office-365-message-encryption"}, {"n": 95, "cat": "情報保護", "q": "Contosoは、外部受信者が暗号化メールを受信後7日間だけ閲覧できるようにする必要があります。構成すべきものはどれですか。", "choices": {"A": "7日間の監査保持ポリシー", "B": "カスタムOME構成の有効期限", "C": "7日間のeDiscovery保留", "D": "7日間のEndpoint DLPポリシー"}, "answer": ["B"], "multi": false, "expl": "Advanced Message EncryptionのカスタムOME構成では、外部受信者が暗号化メッセージを閲覧できる期間を有効期限として設定できます。", "url": "https://learn.microsoft.com/en-us/purview/manage-office-365-message-encryption"}, {"n": 96, "cat": "情報保護", "q": "退職者が独自のアクセス許可で暗号化した多数のファイルを、権限を持つ担当者が復号して再分類する必要があります。使用すべき機能はどれですか。", "choices": {"A": "DLPユーザーオーバーライド", "B": "保持ラベルの処分レビュー", "C": "Azure Rights Managementのスーパー ユーザー", "D": "eDiscoveryのカストディアン"}, "answer": ["C"], "multi": false, "expl": "Rights Managementのスーパー ユーザー機能は、承認された担当者やサービスが組織で暗号化されたコンテンツを復号し、保護を変更できるようにします。", "url": "https://learn.microsoft.com/en-us/purview/encryption-super-users"}, {"n": 97, "cat": "情報保護", "q": "ContosoはカスタムSITを作成します。チェックサムに合格した識別番号に加え、近接範囲内に「Employee ID」がある場合だけ高信頼度として検出する必要があります。どこで構成しますか。", "choices": {"A": "保持ラベルの優先度", "B": "監査保持期間", "C": "eDiscoveryエクスポート設定", "D": "パターンの信頼度と裏付け証拠"}, "answer": ["D"], "multi": false, "expl": "カスタムSITでは、プライマリ要素、裏付け証拠、近接範囲をパターンとして組み合わせ、低・中・高の信頼度レベルごとに要件を定義できます。", "url": "https://learn.microsoft.com/en-us/purview/sit-create-a-custom-sensitive-information-type"}, {"n": 98, "cat": "情報保護", "q": "ContosoのカスタムSITは、識別番号の近くに「Customer Number」がある場合だけ一致させる必要があります。調整すべき設定はどれですか。", "choices": {"A": "文字の近接範囲", "B": "監査ポリシーの優先度", "C": "保持期間の開始日", "D": "Endpoint DLPのデバイススコープ"}, "answer": ["A"], "multi": false, "expl": "近接範囲は、プライマリ要素と裏付けキーワードなどが一定文字数以内に存在することを要求し、文脈のない番号による誤検知を抑えます。", "url": "https://learn.microsoft.com/en-us/purview/sit-create-a-custom-sensitive-information-type"}, {"n": 99, "cat": "情報保護", "q": "Contosoは、固定パターンではなく文書の意味と文脈から「製品ロードマップ」を識別する必要があります。どの分類方法を使用すべきですか。", "choices": {"A": "単一のキーワードだけを含むSIT", "B": "トレーニング可能な分類子", "C": "監査保持ポリシー", "D": "eDiscovery保留"}, "answer": ["B"], "multi": false, "expl": "トレーニング可能な分類子は、キーワードや規則だけでは表現しにくい文書カテゴリを、例示データの意味と文脈から識別します。", "url": "https://learn.microsoft.com/en-us/purview/trainable-classifiers-learn-about"}, {"n": 100, "cat": "情報保護", "q": "Contosoは、最初に機密情報が保存されている場所を確認し、次にその情報へユーザーが行った操作を調査します。使用するツールの順序はどれですか。", "choices": {"A": "Activity Explorer、次にContent Explorer", "B": "Audit、次にService health", "C": "Content Explorer、次にActivity Explorer", "D": "eDiscovery、次にCompliance Manager"}, "answer": ["C"], "multi": false, "expl": "Content Explorerは機密情報やラベルの所在を確認するツールで、Activity Explorerはラベル変更やDLP操作などのユーザーアクティビティを調査するツールです。", "url": "https://learn.microsoft.com/en-us/purview/data-classification-content-explorer"}, {"n": 101, "cat": "DLPと保持", "q": "注: この問題は、同じシナリオを提示する一連の問題の一部です。シリーズの各問題には、記載された目標を満たす可能性のある独自の解決策が含まれています。問題セットによっては複数の正しい解決策がある場合もあれば、正しい解決策がない場合もあります。このセクションの問題に回答した後は、その問題に戻ることはできません。そのため、これらの問題はレビュー画面に表示されません。あなたはMicrosoft 365テナントと、Windows 11を実行する500台のコンピューターを所有しています。コンピューターはMicrosoft Purviewにオンボーディングされています。Tailspin_scanner.exeというサードパーティ製アプリケーションが、複数のコンピューター上の保護された機密情報にアクセスしたことが判明しました。Tailspin_scanner.exeは、コンピューターにローカルにインストールされています。アプリケーションが他のドキュメントにアクセスするのを妨げることなく、Tailspin_scanner.exeが機密ドキュメントにアクセスするのをブロックする必要があります。解決策: Microsoft Defender for Cloud Appsから、アプリ検出ポリシーを作成します。これで目標を達成できるでしょうか？", "choices": {"A": "はい", "B": "いいえ"}, "answer": ["B"], "multi": false, "expl": "クラウドアプリの検出ポリシーでは、ローカルアプリによる機密ファイルアクセスを制御できません。Endpoint DLPの非許可アプリ設定が必要です。", "url": "https://learn.microsoft.com/en-us/purview/dlp-configure-endpoint-settings"}, {"n": 102, "cat": "DLPと保持", "q": "注：この質問は、同じシナリオを提示する一連の質問の一部です。シリーズの各質問には、指定された目標を満たす可能性のある独自の解決策が含まれています。一部の質問セットには複数の正しい解決策がある場合がありますが、他の質問セットには正しい解決策がない場合があります。このセクションの質問に回答した後は、その質問に戻ることはできません。その結果、これらの質問はレビュー画面に表示されません。Microsoft 365テナントと、Windows 11を実行する500台のコンピューターがあります。コンピューターはMicrosoft Purviewにオンボードされています。Tailspin_scanner.exeという名前のサードパーティアプリケーションが、複数のコンピューター上の保護された機密情報にアクセスしたことが判明しました。Tailspin_scanner.exeはコンピューターにローカルにインストールされています。Tailspin_scanner.exeが機密ドキュメントにアクセスするのをブロックする必要がありますが、アプリケーションが他のドキュメントにアクセスするのを妨げてはいけません。解決策：Microsoft Defender for Cloud Appsから、アプリケーションを非承認としてマークします。これは目標を満たしていますか？", "choices": {"A": "はい", "B": "いいえ"}, "answer": ["B"], "multi": false, "expl": "Defender for Cloud Appsでアプリを非承認にしても、ローカルアプリの機密ファイルアクセスは制御しません。Endpoint DLPの非許可アプリ設定が必要です。", "url": "https://learn.microsoft.com/en-us/purview/dlp-configure-endpoint-settings"}, {"n": 103, "cat": "DLPと保持", "q": "注：この質問は、同じシナリオを提示する一連の質問の一部です。シリーズの各質問には、指定された目標を満たす可能性のある独自の解決策が含まれています。一部の質問セットには複数の正しい解決策がある場合もあれば、正しい解決策がない場合もあります。このセクションの質問に回答した後は、その質問に戻ることはできません。その結果、これらの質問はレビュー画面に表示されません。Microsoft 365 エンドポイントデータ損失防止（エンドポイントDLP）を実装します。Windows 11を実行し、Microsoft 365 Appsがインストールされているコンピューターがあります。コンピューターはMicrosoft Entraテナントに参加しています。エンドポイントDLPポリシーがコンピューター上のコンテンツを確実に保護できるようにする必要があります。解決策：Microsoft Purview Information Protectionクライアントをコンピューターに展開します。これは目標を満たしていますか？", "choices": {"A": "はい", "B": "いいえ"}, "answer": ["B"], "multi": false, "expl": "Information Protectionクライアントの導入だけではEndpoint DLPは有効になりません。デバイスのオンボードが必要です。", "url": "https://learn.microsoft.com/en-us/purview/device-onboarding-overview"}, {"n": 104, "cat": "DLPと保持", "q": "注: この質問は、同じシナリオを提示する一連の質問の一部です。シリーズの各質問には、指定された目標を満たす可能性のある独自の解決策が含まれています。質問セットによっては複数の正しい解決策がある場合もあれば、正しい解決策がない場合もあります。このセクションの質問に回答した後は、その質問に戻ることはできません。そのため、これらの質問はレビュー画面に表示されません。Microsoft 365 エンドポイントデータ損失防止 (エンドポイントDLP) を実装します。Windows 11を実行し、Microsoft 365 Appsがインストールされているコンピューターがあります。コンピューターはMicrosoft Entraテナントに参加しています。エンドポイントDLPポリシーがコンピューター上のコンテンツを保護できるようにする必要があります。解決策: コンピューターをMicrosoft Defender for Endpointにオンボードします。これは目標を満たしていますか？", "choices": {"A": "はい", "B": "いいえ"}, "answer": ["A"], "multi": false, "expl": "Endpoint DLPはMicrosoft Defender for Endpointのデバイスオンボード基盤を利用します。", "url": "https://learn.microsoft.com/en-us/purview/device-onboarding-overview"}, {"n": 105, "cat": "DLPと保持", "q": 策がない場合があります。このセクションの質問に回答した後は、その質問に戻ることはできません。その結果、これらの質問はレビュー画面に表示されません。最近、会社の開発者がAzureストレージアカウントキーをプレーンテキストでサードパーティにメールで送信したことが判明しました。Azureストレージアカウントキーがメールで送信される場合、そのメールが暗号化されるようにする必要があります。解決策：Exchangeメール、SharePointサイト、OneDriveアカウント、およびTeamsのチャットとチャネルメッセージが選択されたデータ損失防止（DLP）ポリシーを作成します。これは目標を満たしていますか？", "choices": {"A": "はい", "B": "いいえ"}, "answer": ["A"], "multi": false, "expl": "Exchangeを対象とするDLPルールはSIT一致を検出し、メッセージ暗号化アクションを適用できます。ほかの場所を追加しても目標を妨げません。", "url": "https://learn.microsoft.com/en-us/purview/dlp-learn-about-dlp"}, {"n": 109, "cat": "DLPと保持", "q": "保持ラベルポリシーを使用するMicrosoft 365サブスクリプションがあります。過去30日間に保持ラベルに加えられたすべての変更を特定する必要があります。Microsoft Purviewポータルで何を使用する必要がありますか？", "choices": {"A": "レポート", "B": "アクティビティエクスプローラー", "C": "コンテンツ検索", "D": "使用データ検索"}, "answer": ["B"], "multi": false, "expl": "アクティビティエクスプローラーでは、保持ラベルの適用・変更などのラベル関連アクティビティを期間指定で確認できます。", "url": "https://learn.microsoft.com/en-us/purview/data-classification-activity-explorer"}, {"n": 110, "cat": "DLPと保持", "q": "プロジェクトの終了時に、多数のファイルが含まれるMicrosoft SharePoint Onlineライブラリにプロジェクトドキュメントをアップロードします。プロジェクトドキュメントのファイル名のサンプルは次のとおりです。\n\naei_AA989.docx\n\nbci_WS098.docx\n\ncei_DF112.docx\n\nebc_QQ454.docx\n\necc_BB565.docx\nこの命名規則を使用するすべてのドキュメントには、「Project Documents」というラベルを付ける必要があります。自動適用保持ラベルポリシーを作成する必要があります。ファイルを識別するために何を使用すべきですか？", "choices": {"A": "トレーニング可能な分類子", "B": "機密情報の種類", "C": "保持ラベル", "D": "FileNameプロパティを対象とする検索クエリ"}, "answer": ["D"], "multi": false, "expl": "自動適用ポリシーは検索可能プロパティを使うクエリを条件にできるため、FileNameプロパティで命名規則を識別します。", "url": "https://learn.microsoft.com/en-us/purview/apply-retention-labels-automatically"}, {"n": 111, "cat": "DLPと保持", "q": "Microsoft 365 E5テナントがあります。データ損失防止(DLP)ポリシーを作成します。ポリシーがMicrosoft Teamsのチャットセッション内のドキュメントを保護するようにする必要があります。ポリシーで有効にする必要がある場所はどれですか？", "choices": {"A": "SharePointサイト", "B": "Teamsチャットとチャネルメッセージ", "C": "Exchangeメール", "D": "OneDriveアカウント"}, "answer": ["D"], "multi": false, "expl": "Teamsチャットで共有されたファイルは送信者のOneDriveに保存されるため、ファイル本体の保護にはOneDriveアカウントの場所を含めます。", "url": "https://learn.microsoft.com/en-us/purview/dlp-microsoft-teams"}, {"n": 112, "cat": "DLPと保持", "q": "Microsoft Teamsのチャネル会話およびプライベートチャットからのすべてのファイルを保持するアイテム保持ポリシーを作成する必要があります。アイテム保持ポリシーで選択すべき2つの場所はどれですか。それぞれの正解はソリューションの一部を示しています。注：正解を1つ選択するごとに1ポイントの価値があります。", "choices": {"A": "Microsoft 365グループ", "B": "Exchangeメール", "C": "Teamsチャネルメッセージ", "D": "SharePointサイト", "E": "OneDriveアカウント", "F": "Teamsチャット"}, "answer": ["D", "E"], "multi": true, "expl": "TeamsチャネルのファイルはSharePoint、チャットで共有したファイルはOneDriveに保存されます。メッセージの場所ではなく、両ファイル保存場所を選びます。", "url": "https://learn.microsoft.com/en-us/purview/create-retention-policies"}, {"n": 113, "cat": "DLPと保持", "q": "Microsoft 365 E5テナントがあり、Label1という名前の保持ラベルがあります。Label1を適用する自動ラベル付けポリシーを作成する必要があります。Label1はどの場所に適用できますか？", "choices": {"A": "OneDriveアカウント", "B": "Microsoft Entraセキュリティグループ", "C": "Microsoft Defender for Cloud Apps", "D": "Teamsチャット"}, "answer": ["A"], "multi": false, "expl": "保持ラベルの自動適用はOneDriveを対象にできます。Teamsチャット自体やEntraグループ、Defender for Cloud Appsは対象場所ではありません。", "url": "https://learn.microsoft.com/en-us/purview/apply-retention-labels-automatically"}, {"n": 114, "cat": "DLPと保持", "q": "保持期間が7年の保持ラベルを作成します。クレジットカード番号を含むドキュメントが7年間保持されるようにする必要があります。他のドキュメントは保持してはなりません。何を作成する必要がありますか？", "choices": {"A": "自動適用タイプの保持ラベルポリシー", "B": "公開タイプの保持ラベルポリシー", "C": "ファイルを自動的に削除する保持ポリシー", "D": "ファイルを自動的に保持する保持ポリシー"}, "answer": ["A"], "multi": false, "expl": "クレジットカード番号を条件に、7年保持ラベルを該当アイテムだけへ付けるには自動適用ラベルポリシーを使います。", "url": "https://learn.microsoft.com/en-us/purview/apply-retention-labels-automatically"}, {"n": 115, "cat": "DLPと保持", "q": "Microsoft 365 E5サブスクリプションがあります。データ損失防止(DLP)違反を検出するMicrosoft Defender for Cloud Appsポリシーを作成する必要があります。何を作成する必要がありますか？", "choices": {"A": "アクセスポリシー", "B": "アクティビティポリシー", "C": "ファイルポリシー", "D": "セッションポリシー"}, "answer": ["C"], "multi": false, "expl": "Defender for Cloud Appsで保存済みファイルの内容を検査し、DLP違反を検出するのはファイルポリシーです。", "url": "https://learn.microsoft.com/en-us/defender-cloud-apps/data-protection-policies"}, {"n": 116, "cat": "DLPと保持", "q": "ユーザーがMicrosoft OneDriveから社外のユーザーに機密ドキュメントを共有したときにアラートを受け取る必要があります。どうするべきですか？", "choices": {"A": "Microsoft Defenderポータルから、アクティビティポリシーを作成する。", "B": "Microsoft Purviewポータルから、Advanced eDiscovery検索を開始する。", "C": "Exchange管理センターから、データ損失防止（DLP）ポリシーを作成する。", "D": "Microsoft Defenderポータルから、ファイルポリシーを作成する。"}, "answer": ["D"], "multi": false, "expl": "OneDriveのファイル内容と外部共有状態を継続評価し、アラートを生成するにはファイルポリシーを使います。", "url": "https://learn.microsoft.com/en-us/defender-cloud-apps/data-protection-policies"}, {"n": 117, "cat": "DLPと保持", "q": "Microsoft 365 E5サブスクリプションがあります。ユーザーがデータ損失防止(DLP)で保護されたドキュメントを以下のサードパーティWebサイトにアップロードできないようにする必要があります。\n・ web1.contoso.com\n・ web2.contoso.com\nソリューションは管理作業を最小限に抑える必要があります。エンドポイントDLPの「サービスドメイン」設定に何を設定する必要がありますか？", "choices": {"A": ".contoso.com", "B": "contoso.com", "C": "web1.contoso.com と web2.contoso.com", "D": "web.contoso.com"}, "answer": ["C"], "multi": false, "expl": "サービスドメインは対象となる完全修飾ドメインを登録します。2サイトだけを制御する場合は両方を個別に指定します。", "url": "https://learn.microsoft.com/en-us/purview/dlp-configure-endpoint-settings"}, {"n": 118, "cat": "DLPと保持", "q": "Microsoft 365 E5サブスクリプションがあります。次の場所に対して静的保持ポリシーを作成する必要があります。\n・ Teamsチャット\n・ Exchangeメール\n・ SharePointサイト\n・ Microsoft 365グループ\n・ Teamsチャネルメッセージ\n必要な保持ポリシーの最小数はいくつですか？", "choices": {"A": "1", "B": "2", "C": "3", "D": "4", "E": "5"}, "answer": ["B"], "multi": false, "expl": "Teamsのチャット／チャネル場所用に1つ、Exchange・SharePoint・Microsoft 365グループ用に1つが必要なので最小2ポリシーです。場所が4種類でもポリシー数は4ではありません。", "url": "https://learn.microsoft.com/en-us/purview/create-retention-policies"}, {"n": 119, "cat": "DLPと保持", "q": "DLP1という名前の新しいデータ損失防止(DLP)ポリシーを作成する予定です。DLP1はExchangeメールの場所に適用されます。User1とUser2という名前の2人のユーザーをDLP1から除外する必要があります。最初に何をすべきですか？", "choices": {"A": "Microsoft Exchangeで組織共有ポリシーを作成する。", "B": "高度なDLPルールを作成する。", "C": "Microsoft Exchangeでメールフロールールを作成する。", "D": "User1とUser2を含む配布リストを作成する。"}, "answer": ["D"], "multi": false, "expl": "Exchange場所の静的な除外では配布グループを指定できるため、まず対象2ユーザーを含む配布リストを作成します。", "url": "https://learn.microsoft.com/en-us/purview/dlp-create-deploy-policy"}, {"n": 120, "cat": "DLPと保持", "q": "Microsoft Teamsを使用し、User1とUser2という2人のユーザーを含むMicrosoft 365 E5テナントがあります。User1とUser2のTeamsチャットおよびチャネルメッセージの場所に適用されるデータ損失防止（DLP）ポリシーを作成します。どのTeamsエンティティがDLP保護の対象になりますか？", "choices": {"A": "1対1/Nチャットおよび一般チャネルのみ", "B": "1対1/Nチャットおよびプライベートチャネルのみ", "C": "1対1/Nチャット、一般チャネル、およびプライベートチャネル", "D": "1対1/Nチャットのみ"}, "answer": ["D"], "multi": false, "expl": "Teams場所を特定ユーザーにスコープすると、そのユーザーが参加するチャットメッセージを対象にします。チャネルはチーム全体の場所であり、このユーザースコープの対象ではありません。", "url": "https://learn.microsoft.com/en-us/purview/dlp-microsoft-teams"}, {"n": 121, "cat": "DLPと保持", "q": "Microsoft 365サブスクリプションがあります。ユーザーがMicrosoft SharePointライブラリ内の個々のドキュメントに保持ラベルを適用できるようにする必要があります。どの2つのアクションを実行する必要がありますか？それぞれの正解はソリューションの一部を示しています。注: 正解を1つ選択するごとに1ポイントの価値があります。", "choices": {"A": "Microsoft Defender for Cloud Appsから、ファイルポリシーを作成する。", "B": "SharePoint管理センターから、サイト設定を変更する。", "C": "SharePoint管理センターから、レコード管理設定を変更する。", "D": "Microsoft Purviewポータルから、ラベルを公開する。", "E": "Microsoft Purviewポータルから、ラベルを作成する。"}, "answer": ["D", "E"], "multi": true, "expl": "ユーザーがSharePointアイテムへ手動適用するには、保持ラベルを作成し、発行ポリシーで利用者に公開します。", "url": "https://learn.microsoft.com/en-us/purview/create-apply-retention-labels"}, {"n": 122, "cat": "DLPと保持", "q": "User1という名前のユーザーを含むMicrosoft 365サブスクリプションがあります。Label1という名前の「極秘」秘密度ラベルを作成します。User1がMicrosoft 365 Copilotを使用して、Label1が適用されたコンテンツを要約するのを防ぐ必要があります。ソリューションでは、User1がそのコンテンツに直接アクセスできることを保証する必要があります。どの種類のポリシーを作成する必要がありますか？", "choices": {"A": "コミュニケーションコンプライアンス", "B": "保持", "C": "データ損失防止 (DLP)", "D": "インサイダーリスク管理"}, "answer": ["C"], "multi": false, "expl": "Microsoft 365 Copilot場所のDLPポリシーは、指定ラベルのコンテンツをCopilotの処理から除外しつつ、元のアクセス権は変更しません。", "url": "https://learn.microsoft.com/en-us/purview/dlp-microsoft365-copilot-location-learn-about"}, {"n": 123, "cat": "DLPと保持", "q": "Microsoft Entra参加済みWindowsデバイスでクレジットカードデータが見つかったときにレポートするように、データ損失防止(DLP)ポリシーを構成しています。ポリシーからの情報を使用して、機密データをクリップボードにコピーする機能を制限する予定です。ポリシーの高度なDLPルールで何を構成する必要がありますか？", "choices": {"A": "ユーザー通知", "B": "インシデントレポート", "C": "アクション", "D": "ユーザーの上書き"}, "answer": ["C"], "multi": false, "expl": "クリップボードへのコピーを監査・警告・ブロックする制御は、高度なDLPルールのアクションとして構成します。", "url": "https://learn.microsoft.com/en-us/purview/endpoint-dlp-learn-about"}, {"n": 124, "cat": "DLPと保持", "q": "Site1という名前のMicrosoft SharePoint Onlineサイトを含むMicrosoft 365 E5サブスクリプションがあります。Microsoft Purviewのデータライフサイクル管理を実装する必要があります。最初に何を作成する必要がありますか？", "choices": {"A": "秘密度ラベルポリシー", "B": "データ損失防止 (DLP) ポリシー", "C": "自動ラベル付けポリシー", "D": "保持ラベル"}, "answer": ["D"], "multi": false, "expl": "アイテム単位のライフサイクルを実装する起点は保持ラベルの作成です。その後に発行または自動適用します。", "url": "https://learn.microsoft.com/en-us/purview/create-apply-retention-labels"}, {"n": 125, "cat": "DLPと保持", "q": "保持ラベルポリシーを持つMicrosoft 365テナントがあります。次の要件を満たすようにポリシーを構成する必要があります。\n\nポリシーの無効化または削除を防止する。\n\n新しいラベルを追加できるようにする。\n\nラベルの削除を防止する。\n何をすべきですか？", "choices": {"A": "インサイダーリスク管理を有効にする。", "B": "規制レコードオプションを有効にする。", "C": "ファイルプランをインポートする。", "D": "保持ロックを作成する。"}, "answer": ["D"], "multi": false, "expl": "Preservation Lockはポリシーの無効化・削除と既存設定の緩和を防ぎますが、保持期間の延長や追加は許可します。", "url": "https://learn.microsoft.com/en-us/purview/retention-preservation-lock"}, {"n": 126, "cat": "DLPと保持", "q": "Microsoft 365 E5サブスクリプションがあり、Device1という名前のデバイスが含まれています。Device1のエンドポイントデータ損失防止（エンドポイントDLP）を有効にする必要があります。Microsoft Purviewポータルで最初に何をすべきですか？", "choices": {"A": "デバイスのオンボーディングを有効にする。", "B": "Microsoft Privaプライバシーリスク管理を有効にする。", "C": "Microsoft Purviewインフォメーションバリア（IB）セグメントを作成する。", "D": "Microsoft Purview Information Protectionスキャナークラスターを追加する。", "E": "Device1をMicrosoft Purviewにオンボーディングする。"}, "answer": ["A"], "multi": false, "expl": "Purviewポータルでまずデバイスオンボーディング機能を有効にし、その後に個々のデバイスをオンボードします。", "url": "https://learn.microsoft.com/en-us/purview/device-onboarding-overview"}, {"n": 127, "cat": "DLPと保持", "q": "2つのMicrosoft SharePoint Onlineサイト（Site1とSite2）を含むMicrosoft 365 E5サブスクリプションがあります。Label1という名前の保持ラベルを構成し、Site1のすべてのファイルにLabel1を適用する予定です。Site1でファイルが作成されてから2年後に、ファイルが自動的にSite2に移動するようにする必要があります。Label1の「保持期間の終了後にどうするかを選択する」設定をどのように構成する必要がありますか？", "choices": {"A": "保持設定を非アクティブ化する", "B": "Power Automate フローを実行する", "C": "処分レビューを開始する", "D": "ラベルを変更する"}, "answer": ["B"], "multi": false, "expl": "保持期間終了時にPower Automateフローを実行する設定を使い、Site2への移動処理を自動化します。", "url": "https://learn.microsoft.com/en-us/purview/retention-settings"}, {"n": 128, "cat": "DLPと保持", "q": "Microsoft 365 E5サブスクリプションがあります。クレジットカード番号を含むすべてのメッセージまたはドキュメントが、作成から12か月後に自動的に削除されるようにする必要があります。ソリューションは管理作業を最小限に抑える必要があります。どの2つのコンポーネントを作成する必要がありますか？それぞれの正解はソリューションの一部を示しています。注：正解を1つ選択するごとに1ポイントの価値があります。", "choices": {"A": "秘密度ラベルの自動ラベル付けポリシー", "B": "秘密度ラベル", "C": "保持ラベルの自動ラベル付けポリシー", "D": "保持ラベル", "E": "機密情報の種類 (SIT)"}, "answer": ["C", "D"], "multi": true, "expl": "12か月後の自動削除を定義する保持ラベルと、クレジットカード番号を条件にそれを付ける自動適用ポリシーが必要です。", "url": "https://learn.microsoft.com/en-us/purview/apply-retention-labels-automatically"}, {"n": 129, "cat": "DLPと保持", "q": "Contosoでは、契約文書を7年間保持した後、レコード管理者が内容を確認してから削除する必要があります。保持期間終了時の動作として何を構成すべきですか。", "choices": {"A": "保持設定を無効化する", "B": "Power Automateフローを実行する", "C": "アイテムを自動的に削除する", "D": "処分レビューを開始する"}, "answer": ["D"], "multi": false, "expl": "処分レビューを使うと、指定したレビュアーが保持期間終了後のアイテムについて、削除、保持延長、再ラベル付けなどを判断できます。", "url": "https://learn.microsoft.com/en-us/purview/disposition"}, {"n": 130, "cat": "DLPと保持", "q": "Contosoは新しいDLPポリシーを作成しました。ポリシーを強制する前に、一致するアイテムとユーザーへの影響を確認する必要があります。どのモードでポリシーを実行すべきですか。", "choices": {"A": "直ちに有効化する", "B": "無効のままにする", "C": "ポリシーを削除する", "D": "シミュレーションモードで実行する"}, "answer": ["D"], "multi": false, "expl": "DLPポリシーのシミュレーションでは、保護アクションを強制せずに一致と影響を評価できます。結果を確認してからポリシーを有効化します。", "url": "https://learn.microsoft.com/en-us/purview/dlp-create-deploy-policy"}, {"n": 131, "cat": "DLPと保持", "q": "ContosoのDLPポリシーは、機密情報を含むメールの送信をブロックします。承認済みの業務上の理由がある場合に限り、ユーザーが理由を記録して送信を続行できるようにする必要があります。構成すべき設定はどれですか。", "choices": {"A": "ルールの優先度を下げる", "B": "業務上の理由を伴うユーザーオーバーライドを許可する", "C": "インシデントレポートを無効にする", "D": "ポリシーを監査専用に変更する"}, "answer": ["B"], "multi": false, "expl": "DLPのユーザーオーバーライドでは、ポリシーヒントから正当な理由を指定して制限を上書きできます。上書きは監査されます。", "url": "https://learn.microsoft.com/en-us/purview/dlp-policy-reference"}, {"n": 132, "cat": "DLPと保持", "q": "Contosoは、社内固有のSIT、共有状態、ユーザーの部門を組み合わせてデータ漏えいを防止する必要があります。組み込みテンプレートでは要件を満たしません。何を作成すべきですか。", "choices": {"A": "カスタムDLPポリシー", "B": "保持ポリシー", "C": "監査保持ポリシー", "D": "eDiscoveryケース"}, "answer": ["A"], "multi": false, "expl": "カスタムDLPポリシーでは、組織固有のSIT、条件、例外、アクションを組み合わせたルールを定義できます。", "url": "https://learn.microsoft.com/en-us/purview/dlp-create-deploy-policy"}, {"n": 133, "cat": "DLPと保持", "q": "Contosoでは、契約書を契約満了日から7年間保持する必要があります。契約満了日は管理対象プロパティとして文書に記録されます。どの保持方法を使用すべきですか。", "choices": {"A": "作成日時から開始する保持ポリシー", "B": "最終更新日時から開始する保持ラベル", "C": "ラベル適用日時から開始する保持ラベル", "D": "イベントベースの保持ラベル"}, "answer": ["D"], "multi": false, "expl": "イベントベースの保持では、契約満了や従業員退職などのイベントを起点に、関連アイテムの保持期間を開始できます。", "url": "https://learn.microsoft.com/en-us/purview/retention"}, {"n": 134, "cat": "DLPと保持", "q": "ContosoはEndpoint DLPを段階的に展開します。最初の30日間は、機密ファイルに対するユーザー操作を記録しますが、ユーザーの操作はブロックしない要件があります。使用すべき制限モードはどれですか。", "choices": {"A": "ブロック", "B": "上書きを許可してブロック", "C": "監査のみ", "D": "ポリシーを無効化"}, "answer": ["C"], "multi": false, "expl": "監査のみでは、対象アクティビティを記録しますが、ユーザー操作を制限しません。段階的なEndpoint DLP展開に適します。", "url": "https://learn.microsoft.com/en-us/purview/endpoint-dlp-learn-about"}, {"n": 135, "cat": "DLPと保持", "q": "Contosoでは、Department属性がLegalのユーザーを保持ポリシーの対象にし、異動時には対象範囲を自動更新する必要があります。使用すべきスコープはどれですか。", "choices": {"A": "静的スコープ", "B": "アダプティブスコープ", "C": "組織全体の固定スコープ", "D": "eDiscoveryカストディアンスコープ"}, "answer": ["B"], "multi": false, "expl": "アダプティブスコープは、ユーザー、グループ、サイトの属性クエリに基づいてメンバーシップを自動更新します。", "url": "https://learn.microsoft.com/en-us/purview/purview-adaptive-scopes"}, {"n": 136, "cat": "DLPと保持", "q": "SharePointサイトに保持設定が適用されています。ユーザーが保持期間中の文書を編集または削除した場合、保持対象のコピーはどこに保存されますか。", "choices": {"A": "Preservation Holdライブラリ", "B": "サイト資産ライブラリ", "C": "Microsoft Purview監査ログ", "D": "Azure Blob Storage"}, "answer": ["A"], "multi": false, "expl": "SharePointとOneDriveでは、保持対象のコンテンツが編集または削除されると、保持すべきコピーがPreservation Holdライブラリに保存されます。", "url": "https://learn.microsoft.com/en-us/purview/retention-policies-sharepoint"}, {"n": 137, "cat": "DLPと保持", "q": "Contosoでは、規制レコードが承認済みの処分プロセスによって完全に削除されたことを監査人へ提示する必要があります。使用すべき機能はどれですか。", "choices": {"A": "処分の証明", "B": "監査検索のエクスポート", "C": "保持ポリシーのロック", "D": "Content Explorer"}, "answer": ["A"], "multi": false, "expl": "処分の証明は、処分レビューなどを経てアイテムが正式に処分されたことを示す証跡を提供します。", "url": "https://learn.microsoft.com/en-us/purview/get-started-with-records-management"}, {"n": 138, "cat": "DLPと保持", "q": "Contosoは、特定の契約書だけをレコードとして7年間保持し、それ以外のSharePointコンテンツにはサイト全体の保持設定を適用したいと考えています。個別アイテムと場所全体に使用する機能の組み合わせはどれですか。", "choices": {"A": "個別アイテムにDLPポリシー、場所全体に秘密度ラベル", "B": "個別アイテムに保持ポリシー、場所全体に保持ラベル", "C": "個別アイテムに保持ラベル、場所全体に保持ポリシー", "D": "両方に監査保持ポリシー"}, "answer": ["C"], "multi": false, "expl": "保持ラベルはアイテム単位で適用でき、保持ポリシーはExchange、SharePoint、OneDriveなどの場所を対象に包括的な保持設定を適用します。", "url": "https://learn.microsoft.com/en-us/purview/retention"}, {"n": 139, "cat": "DLPと保持", "q": "Contosoは、機密情報を含むSharePoint文書が組織外ユーザーと共有された場合だけDLPルールを適用する必要があります。ルールに追加すべき条件はどれですか。", "choices": {"A": "コンテンツがMicrosoft 365内から受信された", "B": "コンテンツが作成された", "C": "コンテンツが削除された", "D": "コンテンツが組織外のユーザーと共有された"}, "answer": ["D"], "multi": false, "expl": "共有状態を評価する条件を使用すると、機密情報を含み、組織外へ共有されたコンテンツにDLPルールを限定できます。", "url": "https://learn.microsoft.com/en-us/purview/dlp-policy-reference"}, {"n": 140, "cat": "DLPと保持", "q": "Exchange Online 連携のテナント。ユーザーのメールボックスから削除されたメールを復元したい。適切な PowerShell コマンド2つは？", "choices": {"A": "Get-RecoverableItems", "B": "Restore-RecoverableItems", "C": "Set-MailboxRestoreRequest", "D": "Get-MailboxRestoreRequest", "E": "Restore-Mailbox"}, "answer": ["A", "B"], "multi": true, "expl": "Get-RecoverableItemsで回復可能な削除済みメールを検索し、Restore-RecoverableItemsでメールボックスへ復元します。", "url": "https://learn.microsoft.com/en-us/purview/retention"}, {"n": 141, "cat": "DLPと保持", "q": "Contoso（Microsoft 365 E5）。HR担当がパスポート番号を含む文書を外部に共有するのを制限するDLPを要求。ポリシーで指定すべき構成要素3つは？", "choices": {"A": "場所: SharePointとOneDriveのみ", "B ドサービスへのアップロードを制御するには、Endpoint DLPポリシーを作成し、対象サービスのドメインをEndpoint DLP設定へ登録します。", "url": "https://learn.microsoft.com/en-us/purview/dlp-configure-endpoint-settings"}, {"n": 186, "cat": "DLPと保持", "q": "保持ポリシーと保持ラベルポリシーに保持ロック(Preservation Lock)を適用済み。実行可能なタスクを3つ選べ。タスク1=保持ポリシーから場所を削除／タスク2=保持ポリシーの保持期間を延長／タスク3=保持ラベルポリシーに新しい場所を追加／タスク4=保持ラベルポリシーでラベルを割当。", "choices": {"A": "タスク4", "B": "タスク1", "C": "タスク3", "D": "タスク2"}, "answer": ["A", "C", "D"], "multi": true, "expl": "保持ロックでは「延長・追加」は可、「削除・短縮」は不可。タスク1(場所削除)は不可。", "url": "https://learn.microsoft.com/en-us/purview/retention-preservation-lock"}, {"n": 187, "cat": "DLPと保持", "q": "ContosoはMicrosoft 365 E5を使用しています。コンプライアンス管理者はDLPとデータライフサイクル管理を構成しています。\n\nArchiveLabelをFactoryDocsの全文書に適用し、作成2年後にCorporateDocsへ自動移動させたい。「保持期間終了後の動作」の設定は？", "choices": {"A": "保持設定を無効化", "B": "Power Automateワークフローをトリガー", "C": "別のラベルに変更", "D": "処分レビューを開始"}, "answer": ["B"], "multi": false, "expl": "保持期間終了時にPower Automateフローを実行するよう保持ラベルを構成し、そのフローで対象文書を別のSharePointライブラリへ移動します。", "url": "https://learn.microsoft.com/en-us/purview/retention-label-flow"}, {"n": 188, "cat": "DLPと保持", "q": "ContosoのSharePoint向けDLPポリシーには複数のルールがあります。同じ文書が複数ルールへ一致しました。ホスト型サービスでルールが評価される順序はどれですか。", "choices": {"A": "最後に作成したルールだけが評価される", "B": "アルファベット順に評価される", "C": "すべてランダムに評価される", "D": "ポリシー内の最高優先度ルールから順番に評価される"}, "answer": ["D"], "multi": false, "expl": "Exchange、SharePoint、OneDriveなどのホスト型サービスでは、ポリシー内のルールは最高優先度から順番に評価されます。", "url": "https://learn.microsoft.com/en-us/purview/dlp-policy-reference"}, {"n": 189, "cat": "DLPと保持", "q": "Endpoint DLPで、同じファイルが「印刷をブロック」するポリシーと「USBコピーをブロック」する別ポリシーへ一致しました。両ポリシーは強制モードです。実行時の動作はどれですか。", "choices": {"A": "印刷とUSBコピーの両方がブロックされる", "B": "最初のポリシーだけが適用される", "C": "どちらも監査だけになる", "D": "ユーザーが任意のポリシーを選択する"}, "answer": ["A"], "multi": false, "expl": "Endpoint DLPは、複数の一致から最も制限の強いアクションを集約して適用します。この例では印刷とUSBコピーの両方がブロックされます。", "url": "https://learn.microsoft.com/en-us/purview/dlp-policy-reference"}, {"n": 190, "cat": "DLPと保持", "q": "同じEndpoint DLPアクティビティについて、Policy1は「オーバーライド不可でブロック」、Policy2は「理由を入力すればオーバーライド可能でブロック」を構成しています。両方へ一致した場合の動作はどれですか。", "choices": {"A": "常にオーバーライドできる", "B": "オーバーライド不可のブロックが適用される", "C": "両方とも無効になる", "D": "監査だけになる"}, "answer": ["B"], "multi": false, "expl": "Endpoint DLPでオーバーライド設定が競合する場合、より制限の強い「オーバーライド不可」が「オーバーライド可能」より優先されます。", "url": "https://learn.microsoft.com/en-us/purview/dlp-policy-reference"}, {"n": 191, "cat": "DLPと保持", "q": "ContosoはSharePointとTeamsチャットを同じDLPポリシーの場所として選択しました。秘密度ラベルを条件として使用できるか確認する必要があります。正しい説明はどれですか。", "choices": {"A": "SharePointが対応するため常に使用できる", "B": "Teamsでは保持ラベルへ自動変換される", "C": "選択した場所のいずれかが未対応なら、そのコンテンツ定義は使用できない", "D": "場所の対応状況は条件に影響しない"}, "answer": ["C"], "multi": false, "expl": "複数場所を選択した場合、コンテンツ定義について「未対応」が「対応」より優先されます。Teamsチャットは秘密度ラベル条件をサポートしないため、この組み合わせではSITなど共通対応の定義を使用します。", "url": "https://learn.microsoft.com/en-us/purview/dlp-policy-reference"}, {"n": 192, "cat": "DLPと保持", "q": "Contosoは接続済みのBoxに保存されている既存ファイルを継続的に検査し、機密情報を含む外部共有ファイルを検出する必要があります。何を作成すべきですか。", "choices": {"A": "Exchangeメールフロールール", "B": "監査保持ポリシー", "C": "eDiscovery保留", "D": "Defender for Cloud Appsのファイルポリシー"}, "answer": ["D"], "multi": false, "expl": "Defender for Cloud Appsのファイルポリシーは、接続済みクラウドアプリ内の保存済みファイルを継続評価し、共有状態やDLP検査結果を条件にできます。", "url": "https://learn.microsoft.com/en-us/defender-cloud-apps/data-protection-policies"}, {"n": 193, "cat": "DLPと保持", "q": "ユーザーが未評価の新しいファイルを外部へ送信しようとした時点で、クラウドポリシー評価が完了していません。評価中の漏えいを防止するために有効化すべき機能はどれですか。", "choices": {"A": "Endpoint DLPのJust-in-time保護", "B": "監査ログ保持", "C": "処分レビュー", "D": "eDiscoveryの高度なインデックス"}, "answer": ["A"], "multi": false, "expl": "JIT保護は、未評価または評価が古くなった監視対象ファイルについて、ポリシー評価が完了するまで送出アクティビティを一時的に制御します。", "url": "https://learn.microsoft.com/en-us/purview/endpoint-dlp-learn-about-jit"}, {"n": 194, "cat": "DLPと保持", "q": "ContosoはJIT保護を有効化します。分類サービスが失敗した場合でも業務を止めず、ユーザー操作を完了させる必要があります。設定すべきフォールバックはどれですか。", "choices": {"A": "Block all activities", "B": "Allow users to complete actions", "C": "Delete the file", "D": "Start disposition review"}, "answer": ["B"], "multi": false, "expl": "JITのフォールバックをAllow users to complete actionsにすると、分類が失敗した場合は操作を許可します。高い保護を優先する場合はブロックを選択します。", "url": "https://learn.microsoft.com/en-us/purview/endpoint-dlp-get-started-jit"}, {"n": 195, "cat": "DLPと保持", "q": "Contosoは特定フォルダーだけをJIT保護から除外しますが、通常のEndpoint DLPポリシーによる分類と保護は継続する必要があります。どの除外を使用すべきですか。", "choices": {"A": "Endpoint DLP全体のファイルパス除外", "B": "DLPポリシーからDevices場所を削除", "C": "JIT保護専用のファイルパス除外", "D": "デバイスをオフボードする"}, "answer": ["C"], "multi": false, "expl": "JIT専用のパス除外はJIT評価だけを除外し、通常のEndpoint DLP分類と保護は継続します。Endpoint DLP全体のパス除外とは別設定です。", "url": "https://learn.microsoft.com/en-us/purview/endpoint-dlp-get-started-jit"}, {"n": 196, "cat": "DLPと保持", "q": "ContosoはWindows 11上のGoogle Chromeからクラウドサービスへ機密ファイルをアップロードする操作をEndpoint DLPで制御します。必要な構成はどれですか。", "choices": {"A": "Chromeをアンインストールするだけ", "B": "Exchangeメールフロールールを作成する", "C": "監査保持期間を延長する", "D": "デバイスをオンボードし、Microsoft Purview Chrome拡張機能を展開する"}, "answer": ["D"], "multi": false, "expl": "Windows上のChromeでEndpoint DLPのクラウドアップロード制御を使用するには、デバイスのオンボードとMicrosoft Purview拡張機能の展開が必要です。", "url": "https://learn.microsoft.com/en-us/purview/dlp-chrome-get-started"}, {"n": 197, "cat": "DLPと保持", "q": "ある文書には、3年保持ポリシーと7年保持ラベルが適用され、3年ポリシーには期間終了時の削除が構成されています。優先クリーンアップは使用しません。文書が保持される最短期間はどれですか。", "choices": {"A": "7年", "B": "3年", "C": "1年", "D": "直ちに削除"}, "answer": ["A"], "multi": false, "expl": "保持は削除より優先され、複数の保持期間が競合する場合は最長の保持期間が優先されます。この文書は少なくとも7年間保持されます。", "url": "https://learn.microsoft.com/en-us/purview/retention"}, {"n": 198, "cat": "DLPと保持", "q": "あるアイテムには、組織全体の保持ポリシーと保持ラベルの両方から削除アクションが適用されています。保持要件をすべて満たした後、どの削除アクションが優先されますか。", "choices": {"A": "組織全体ポリシーの削除アクション", "B": "保持ラベルの削除アクション", "C": "常に新しく作成した方", "D": "どちらも実行されない"}, "answer": ["B"], "multi": false, "expl": "競合する削除アクションでは、保持ラベルからの削除がすべての保持ポリシーからの削除より優先されます。ただし、必要な保持期間が先に満たされる必要があります。", "url": "https://learn.microsoft.com/en-us/purview/retention"}, {"n": 199, "cat": "DLPと保持", "q": "保持ポリシーにより削除対象となったメールが、進行中のeDiscoveryケースでも保留されています。メールはどのように処理されますか。", "choices": {"A": "保持ポリシーに従って直ちに削除される", "B": "自動的に暗号化される", "C": "eDiscovery保留が解除されるまで保全される", "D": "監査ログだけが残る"}, "answer": ["C"], "multi": false, "expl": "eDiscovery保留は、保持設定による削除より優先してコンテンツを保全します。ケースの保留が管理者により解除されるまで削除できません。", "url": "https://learn.microsoft.com/en-us/purview/retention"}, {"n": 200, "cat": "DLPと保持", "q": "Contosoは、User1のメールボックスとSite1へ割り当てられている保持ポリシーおよび保持ラベルポリシーを特定する必要があります。最初に使用すべき機能はどれですか。", "choices": {"A": "Microsoft 365 Service health", "B": "Defender XDRの高度なハンティング", "C": "Teams管理センターの利用状況レポート", "D": "Data Lifecycle ManagementまたはRecords ManagementのPolicy Lookup"}, "answer": ["D"], "multi": false, "expl": "Policy Lookupは、特定ユーザー、サイト、Microsoft 365グループへ割り当てられている保持ポリシーとラベルポリシーを確認するために使用します。", "url": "https://learn.microsoft.com/en-us/purview/retention"}, {"n": 201, "cat": "リスク管理", "q": "Microsoft 365 E5サブスクリプションがあります。データ損失防止(DLP)ポリシーの一致が発生するたびに、セキュリティマネージャーは電子メールメッセージを受信します。アラート通知をアクション可能なDLPイベントに制限する必要があります。あなたは何をするべきですか？", "choices": {"A": "Microsoft Purviewポータルから、DLPポリシーのポリシーヒント設定を変更する。", "B": "Microsoft Defenderポータルから、アラートにフィルターを適用する。", "C": "Microsoft Purviewポータルから、アラートポリシーの一致するアクティビティのしきい値を変更する。", "D": "Microsoft Purviewポータルから、DLPポリシーのユーザー上書き設定を変更する。"}, "answer": ["C"], "multi": false, "expl": "アラート生成のしきい値を調整すると、すべての一致ではなく対処価値のある頻度や件数に通知を絞れます。", "url": "https://learn.microsoft.com/en-us/purview/dlp-alerts-get-started"}, {"n": 202, "cat": "リスク管理", "q": "Microsoft 365 E5サブスクリプションがあります。Microsoft Purviewのインサイダーリスク管理を使用する予定です。辞表を提出したユーザー、または雇用終了日が近いユーザーによるMicrosoft SharePoint Onlineからのデータ窃取を検出するインサイダーリスク管理ポリシーを作成する必要があります。最初に何を行うべきですか？", "choices": {"A": "Officeインジケーターを構成する。", "B": "HRデータコネクタを構成する。", "C": "物理バッジコネクタを構成する。", "D": "デバイスをMicrosoft Defender for Endpointにオンボードする。"}, "answer": ["B"], "multi": false, "expl": "辞表提出や雇用終了日をトリガーにするには、HRデータをインサイダーリスク管理へ取り込む必要があります。", "url": "https://learn.microsoft.com/en-us/purview/import-hr-data"}, {"n": 203, "cat": "リスク管理", "q": "Microsoft 365 E5サブスクリプションには、User1とAdmin1という2人のユーザーが含まれています。Admin1はサブスクリプションの監査保持ポリシーを管理します。User1の監査ログが10年間保持されるようにする必要があります。最初に何を行うべきですか？", "choices": {"A": "Microsoft Purview Audit (Premium) アドオンライセンスをAdmin1に割り当てる。", "B": "10年間の監査ログ保持アドオンライセンスをAdmin1に割り当てる。", "C": "Microsoft Purview Audit (Premium) アドオンライセンスをUser1に割り当てる。", "D": "10年間の監査ログ保持アドオンライセンスをUser1に割り当てる。"}, "answer": ["D"], "multi": false, "expl": "10年保持アドオンは、監査データを10年間保持する対象ユーザーに割り当てます。", "url": "https://learn.microsoft.com/en-us/purview/audit-log-retention-policies"}, {"n": 204, "cat": "リスク管理", "q": "Microsoft 365 E5サブスクリプションがあります。インサイダーリスク管理を使用して、フォレンジック証拠を収集および調査する予定です。フォレンジック証拠のキャプチャを有効にする必要があります。最初に何をする必要がありますか？", "choices": {"A": "優先ユーザーグループを作成する。", "B": "容量を要求する。", "C": "適応型保護を有効にする。", "D": "情報保護スキャナーを構成する。"}, "answer": ["B"], "multi": false, "expl": "フォレンジック証拠を有効化する前に、組織で使用するキャプチャ容量を申請して承認を受けます。", "url": "https://learn.microsoft.com/en-us/purview/insider-risk-management-forensic-evidence"}, {"n": 205, "cat": "リスク管理", "q": "Microsoft Defender for Cloud Appsを使用するMicrosoft 365 E5サブスクリプションがあります。ユーザーがサードパーティのクラウドストレージサービスにドキュメントをアップロードしたときにアラートを受信するようにする必要があります。何を使用する必要がありますか？", "choices": {"A": "インサイダーリスクポリシー", "B": "ファイルポリシー", "C": "秘密度ラベル", "D": "アクティビティポリシー"}, "answer": ["D"], "multi": false, "expl": "サードパーティクラウドへのアップロードというユーザー操作を検出するにはアクティビティポリシーを使います。", "url": "https://learn.microsoft.com/en-us/defender-cloud-apps/data-protection-policies"}, {"n": 206, "cat": "リスク管理", "q": "Microsoft 365サブスクリプションがあります。Policy1という名前のMicrosoft Purviewインサイダーリスク管理ポリシーを構成します。Policy1のインジケーターしきい値を構成する方法に関するリアルタイムの推奨事項を確実に受け取れるようにする必要があります。ソリューションは、推奨事項が過去10日間のユーザーのアクティビティに基づいていることを保証する必要があります。最初に何を行うべきですか？", "choices": {"A": "インサイダーリスクインジケーターコネクタを作成する。", "B": "インサイダーリスク管理のデータ共有設定を構成する。", "C": "データ損失防止（DLP）ポリシーを作成する。", "D": "インサイダーリスク管理分析を有効にする。"}, "answer": ["D"], "multi": false, "expl": "インサイダーリスク分析は直近の組織アクティビティを評価し、しきい値のリアルタイム推奨を提供します。", "url": "https://learn.microsoft.com/en-us/purview/insider-risk-management-settings-analytics"}, {"n": 207, "cat": "リスク管理", "q": "ユーザーにMicrosoft Purviewポータルでデータ損失防止(DLP)アラートを表示する機能を提供する必要があります。このソリューションでは、最小特権の原則を使用する必要があります。ユーザーにどのロールを割り当てるべきですか？", "choices": {"A": "セキュリティオペレーター", "B": "セキュリティ閲覧者", "C": "コンプライアンスデータ管理者", "D": "コンプライアンス管理者"}, "answer": ["B"], "multi": false, "expl": "閲覧だけを許可する最小特権として、提示された選択肢ではセキュリティ閲覧者が適します。", "url": "https://learn.microsoft.com/en-us/purview/dlp-alerts-get-started"}, {"n": 208, "cat": "リスク管理", "q": "Microsoft 365サブスクリプションがあります。ユーザーはWindows 11を実行するデバイスを使用しています。ユーザーが次のアクションを実行したときに検出するMicrosoft Purviewインサイダーリスク管理ポリシーを作成する予定です。\n\nデバイスから機密情報の種類 (SIT) を含むファイルを削除する\n\nSITを含むファイルをUSBドライブにコピーする\n\nSITを含むファイルを印刷する\nポリシーをサポートするために環境を準備する必要があります。何をする必要がありますか？", "choices": {"A": "物理バッジコネクタを構成する。", "B": "HRデータコネクタを構成する。", "C": "Microsoft Purviewコミュニケーションコンプライアンスポリシーを作成する。", "D": "デバイスをMicrosoft Purviewにオンボードする。"}, "answer": ["D"], "multi": false, "expl": "ファイル削除、USBコピー、印刷などのデバイス指標を収集するには、対象デバイスをMicrosoft Purviewへオンボードします。", "url": "https://learn.microsoft.com/en-us/purview/insider-risk-management-settings-policy-indicators"}, {"n": 209, "cat": "リスク管理", "q": "Contosoは訴訟の通知を受けました。調査対象ユーザーのメールとSharePoint文書が、通常の削除処理やユーザー操作によって失われないようにする必要があります。何を作成すべきですか。", "choices": {"A": "eDiscoveryケースの保留", "B": "DLPポリシー", "C": "秘密度ラベル", "D": "監査保持ポリシー"}, "answer": ["A"], "multi": false, "expl": "eDiscoveryの保留は、ケースに関連するExchange、SharePoint、OneDriveなどのコンテンツを保全します。", "url": "https://learn.microsoft.com/en-us/purview/edisc-hold-create"}, {"n": 210, "cat": "リスク管理", "q": "Contosoでは、一般ユーザーにAudit (Standard)、調査担当者にMicrosoft 365 E5ライセンスを割り当てています。監査レコードの既定保持期間と、10年間保持するための要件を確認する必要があります。正しい説明はどれですか。", "choices": {"A": "すべての監査レコードは既定で30日間保持される", "B": "E5ユーザーを含むすべての監査レコードは既定で10年間保持される", "C": "Audit (Standard)は既定180日で、対象のE5ユーザーの主要ワークロードは既定1年、10年保持には追加ライセンスが必要", "D": "Audit (Standard)とAudit (Premium)はいずれも既定365日である"}, "answer": ["C"], "multi": false, "expl": "Audit (Standard)の既定保持は180日です。対象ライセンスを持つユーザーのExchange、SharePoint、OneDrive、Microsoft Entra監査レコードはAudit (Premium)の既定ポリシーで1年保持され、10年には10-Year Audit Log Retentionアドオンが必要です。", "url": "https://learn.microsoft.com/en-us/purview/audit-log-retention-policies"}, {"n": 211, "cat": "リスク管理", "q": "Contosoのセキュリティ運用チームは、重大度の高いDLPルール一致が発生したときに、指定した担当者へ詳細をメール通知する必要があります。DLPルールで何を構成すべきですか。", "choices": {"A": "ポリシーヒントだけ", "B": "インシデントレポート", "C": "保持ラベル", "D": "eDiscoveryエクスポート"}, "answer": ["B"], "multi": false, "expl": "DLPルールのインシデントレポートを構成すると、ルール一致の詳細を指定した管理者や担当者へ通知できます。", "url": "https://learn.microsoft.com/en-us/purview/dlp-policy-reference"}, {"n": 212, "cat": "リスク管理", "q": "外部規制当局が監査。ユーザー/管理者イベントの監査ログ照会とエクスポートを行うツールが必要。最小権限で割り当てるロールグループは？", "choices": {"A": "Compliance Administrator", "B": "Audit Manager", "C": "Compliance Data Administrator", "D": "Audit Reader"}, "answer": ["D"], "multi": false, "expl": "監査ログの検索・エクスポートは Audit Reader で可能（最小権限）。", "url": "https://learn.microsoft.com/en-us/purview/audit-search"}, {"n": 213, "cat": "リスク管理", "q": "ContosoはMicrosoft 365 E5を使用しています。セキュリティ運用チームはMicrosoft Purviewで調査とリスク対応を行っています。\n\nMicrosoft Purview eDiscovery では、安全で追跡可能な調査を保証するために、すべての検索操作をケース内で実施することが必須か？（正/誤）", "choices": {"A": "正しい", "B": "誤り"}, "answer": ["A"], "multi": false, "expl": "現行eDiscoveryでは検索をケースの中で作成し、権限、検索、保留、エクスポートをケース単位で追跡します。", "url": "https://learn.microsoft.com/en-us/purview/edisc"}, {"n": 214, "cat": "リスク管理", "q": "ContosoはMicrosoft 365 E5を使用しています。セキュリティ運用チームはMicrosoft Purviewで調査とリスク対応を行っています。\n\nインサイダー脅威管理プロセスで、最初に開始されるアクションは？", "choices": {"A": "アラートと問題の解決", "B": "手順の改善・強化", "C": "ケース分析の実行", "D": "潜在的リスクの特定"}, "answer": ["D"], "multi": false, "expl": "ワークフローは「リスクの特定(policy)→アラート→調査(トリアージ)→対応(アクション)」の順。", "url": "https://learn.microsoft.com/en-us/purview/insider-risk-management"}, {"n": 215, "cat": "リスク管理", "q": "ContosoはMicrosoft 365 E5を使用しています。セキュリティ運用チームはMicrosoft Purviewで調査とリスク対応を行っています。\n\nEmployee1のメールボックスに適用された法的保留の種類と数を特定したい。最初のアクションは？", "choices": {"A": "Get-HoldCompliancePolicy を実行", "B": "コンテンツ検索を実行", "C": "新規eDiscovery調査を開始", "D": "Employee1 に対し Get-Mailbox を実行"}, "answer": ["D"], "multi": false, "expl": "Get-Mailbox の保留関連プロパティ（LitigationHold/InPlaceHolds等）で確認できる。", "url": "https://learn.microsoft.com/en-us/purview/edisc"}, {"n": 216, "cat": "リスク管理", "q": "インサイダーリスク管理の Users ダッシュボードは、個々のユーザー行動と関連リスク分析を表示する統合インターフェースとして機能するか？", "choices": {"A": "はい", "B": "いいえ (いいえ)"}, "answer": ["A"], "multi": false, "expl": "Usersダッシュボードはユーザーごとのリスク情報と関連アクティビティをまとめ、調査対象の優先順位付けに使います。", "url": "https://learn.microsoft.com/en-us/purview/insider-risk-management"}, {"n": 217, "cat": "リスク管理", "q": "Defender XDR で、インサイダーリスク通知はユーザーリスクデータと各種Microsoftセキュリティ製品のシグナルを統合する。これは正しいか？", "choices": {"A": "正しい", "B": "誤り"}, "answer": ["A"], "multi": false, "expl": "Defender XDRへ共有されたインサイダーリスク情報は、他のセキュリティアラートと関連付けてインシデント調査に利用できます。", "url": "https://learn.microsoft.com/en-us/purview/insider-risk-management"}, {"n": 218, "cat": "リスク管理", "q": "ContosoはMicrosoft 365 E5を使用しています。セキュリティ運用チームはMicrosoft Purviewで調査とリスク対応を行っています。\n\nProjectXサイトから機密文書を外部共有した際に通知するインサイダーリスク管理を実装したい。必要な手順2つは？", "choices": {"A": "DLPルールを作成", "B": "適応型保護を設定", "C": "インサイダーリスクポリシーを定義", "D": "分析機能を有効化", "E": "インジケーターを有効化"}, "answer": ["C", "E"], "multi": true, "expl": "インジケーター有効化 + インサイダーリスクポリシー定義。", "url": "https://learn.microsoft.com/en-us/purview/insider-risk-management"}, {"n": 219, "cat": "リスク管理", "q": "DSPM for AI 展開済み、ワンクリックポリシーでAI操作を捕捉。Copilot/ChatGPT Enterprise等のプロンプト/応答を正確に記録し、機密情報の種類も含め詳細に調査したい。使うべき DSPM for AI 機能は？", "choices": {"A": "アクティビティエクスプローラー", "B": "概要レポートダッシュボード", "C": "データライフサイクル管理コンソール", "D": "インサイダーリスク管理アラート"}, "answer": ["A"], "multi": false, "expl": "アクティビティエクスプローラーでAI操作を詳細分析。", "url": "https://learn.microsoft.com/en-us/purview/dspm-for-ai"}, {"n": 220, "cat": "リスク管理", "q": "DSPM for AI をAIワークフロー向けに実装。管理者が組織のセキュリティ要件に沿ってポリシーを正しく確立・監督するため、最初にすべきことは？", "choices": {"A": "データ機密度ラベルを作成", "B": "ポリシーをゼロから作成", "C": "定義済みのワンクリックポリシーテンプレートを利用", "D": "データ保持ラベルを設計"}, "answer": ["C"], "multi": false, "expl": "まずワンクリックポリシーテンプレートを利用。", "url": "https://learn.microsoft.com/en-us/purview/dspm-for-ai"}, {"n": 221, "cat": "リスク管理", "q": "ContosoはMicrosof
